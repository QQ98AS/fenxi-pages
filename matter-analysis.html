<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建筑行业事项环节分析</title>
  <style>
    :root {
      --bg: #eef3f7;
      --panel: rgba(255, 255, 255, 0.9);
      --line: rgba(25, 58, 87, 0.1);
      --text: #1b3147;
      --muted: #667a8f;
      --primary: #1685b8;
      --teal: #1e9b82;
      --amber: #f19a34;
      --danger: #df6a49;
      --navy: #0e4b71;
      --shadow: 0 22px 54px rgba(15, 35, 55, 0.1);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 0% 0%, rgba(22, 133, 184, 0.16), transparent 24%),
        radial-gradient(circle at 100% 16%, rgba(241, 154, 52, 0.12), transparent 20%),
        linear-gradient(180deg, #f7fafc 0%, #edf2f6 44%, #e7edf3 100%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(12, 35, 58, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(12, 35, 58, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 92%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page-shell {
      width: min(1500px, calc(100vw - 28px));
      margin: 14px auto;
      padding: 14px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(246, 249, 252, 0.94)),
        rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .page-shell::after {
      content: "";
      position: absolute;
      inset: -90px auto auto -80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22, 133, 184, 0.16), transparent 72%);
      pointer-events: none;
    }

    .hero,
    .section-panel,
    .panel-card,
    .insight-card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
    }

    .hero,
    .section-panel {
      border-radius: var(--radius-xl);
      padding: 14px;
    }

    .hero {
      margin-bottom: 10px;
      background:
        linear-gradient(135deg, rgba(14, 50, 78, 0.98), rgba(10, 113, 151, 0.92) 56%, rgba(18, 148, 126, 0.84));
      color: #eef8ff;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -90px auto;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 70%);
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #e2f7ff;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 8px 0 6px;
      font-size: clamp(1.48rem, 2.8vw, 2.3rem);
      line-height: 1.08;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      max-width: none;
      color: rgba(232, 245, 255, 0.86);
      font-size: 0.85rem;
      line-height: 1.58;
    }

    .hero-chips,
    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .hero-chip,
    .hero-link {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.12);
      color: #f4fbff;
      font-size: 0.74rem;
      text-decoration: none;
    }

    .hero-link {
      background: rgba(255, 255, 255, 0.18);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .hero-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.24);
    }

    .section-panel {
      margin-bottom: 10px;
      z-index: 6;
      overflow: visible;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--muted);
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(25, 58, 87, 0.12);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
    }

    .field-actions {
      display: flex;
      align-items: end;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-primary,
    .btn-secondary {
      min-width: 100px;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #1da2dd, #147ca7);
      box-shadow: 0 12px 20px rgba(22, 133, 184, 0.18);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(25, 58, 87, 0.18);
    }

    .search-select {
      position: relative;
      z-index: 8;
    }

    .search-select input[type="text"] {
      padding-right: 38px;
    }

    .search-select::after {
      content: "v";
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .suggestion-panel {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      max-height: 280px;
      overflow: auto;
      padding: 6px;
      border-radius: 14px;
      border: 1px solid rgba(25, 58, 87, 0.12);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 16px 28px rgba(15, 35, 55, 0.12);
      z-index: 20;
    }

    .suggestion-panel[hidden] {
      display: none;
    }

    .suggestion-item,
    .suggestion-empty {
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .suggestion-item:hover {
      background: rgba(22, 133, 184, 0.08);
    }

    .suggestion-empty {
      color: var(--muted);
      cursor: default;
    }

    .range-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .insight-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 10px;
    }

    .insight-card {
      border-radius: var(--radius-lg);
      padding: 14px;
      background:
        linear-gradient(160deg, rgba(255, 255, 255, 0.98), rgba(241, 247, 252, 0.94));
    }

    .insight-label {
      color: var(--muted);
      font-size: 0.74rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .insight-value {
      margin-top: 10px;
      font-size: 1.18rem;
      font-weight: 800;
      line-height: 1.35;
      color: var(--navy);
    }

    .insight-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.5;
    }

    .panel-card {
      border-radius: var(--radius-lg);
      padding: 14px;
    }

    .panel-card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      align-items: start;
    }

    .panel-card h3 {
      margin: 0;
      font-size: 1.02rem;
      letter-spacing: 0.02em;
    }

    .panel-card p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.5;
    }

    .segment-accepted {
      background: linear-gradient(135deg, #27b1f0, #1685b8);
    }

    .segment-reviewed {
      background: linear-gradient(135deg, #2ab594, #1e9b82);
    }

    .segment-decided {
      background: linear-gradient(135deg, #f2af4a, #e28b21);
    }

    .segment-bureau {
      background: linear-gradient(135deg, #f08964, #d6674c);
    }

    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(18, 48, 76, 0.08);
      background: rgba(255, 255, 255, 0.78);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1120px;
    }

    thead {
      background: rgba(22, 133, 184, 0.06);
    }

    th,
    td {
      padding: 12px 12px;
      border-bottom: 1px solid rgba(18, 48, 76, 0.08);
      vertical-align: middle;
    }

    th {
      font-size: 0.76rem;
      color: var(--muted);
      text-align: left;
      white-space: nowrap;
    }

    tbody tr:hover {
      background: rgba(22, 133, 184, 0.04);
    }

    .number-cell {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    .center-cell {
      text-align: center;
    }

    .empty-state {
      padding: 22px 12px;
      text-align: center;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .cell-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.72rem;
      line-height: 1.4;
    }

    @media (max-width: 1180px) {
      .insight-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 820px) {
      .page-shell {
        width: min(100vw - 12px, 100%);
        margin: 6px auto;
        padding: 8px;
        border-radius: 20px;
      }

      .hero,
      .section-panel,
      .panel-card,
      .insight-card {
        border-radius: 18px;
      }

      .filter-grid {
        grid-template-columns: 1fr 1fr;
      }

      .field,
      .field-actions {
        grid-column: span 2 !important;
      }

      .field-actions {
        flex-wrap: wrap;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }

    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <h1>建筑行业事项环节分析</h1>
      <p>按办结时间汇总建筑行业事项在受理、审核、决定、专业局审批四个环节的办理量，支持按事项与区域组合筛选，并导出当前统计结果，用于快速识别高频事项、关键区域和负荷最重的处理环节。</p>
      <div class="hero-chips">
        <span class="hero-chip">办结时间筛选</span>
        <span class="hero-chip">结果导出</span>
        <span class="hero-chip">事项维度分析</span>
      </div>
      <div class="hero-actions">
        <a class="hero-link" href="index.html">返回企业名录</a>
      </div>
    </header>

    <section class="section-panel">
      <form id="issueFilterForm">
        <div class="filter-grid">
          <div class="field" style="grid-column: span 2;">
            <label for="issueStartDate">办结开始时间</label>
            <input id="issueStartDate" name="issueStartDate" type="date">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="issueEndDate">办结结束时间</label>
            <input id="issueEndDate" name="issueEndDate" type="date">
          </div>
          <div class="field" style="grid-column: span 1;">
            <label for="issueDimension">分析维度</label>
            <select id="issueDimension" name="issueDimension">
              <option value="case">按办件</option>
              <option value="district">按区县</option>
              <option value="sector">按板块</option>
            </select>
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="issueRegion">办理区域</label>
            <select id="issueRegion" name="issueRegion">
              <option value="">全部区域</option>
            </select>
          </div>
          <div class="field" style="grid-column: span 1;">
            <label for="issueSector">板块</label>
            <select id="issueSector" name="issueSector">
              <option value="">全部板块</option>
              <option value="建筑板块">建筑业</option>
              <option value="安全证板块">安全证</option>
              <option value="监理板块">监理</option>
            </select>
          </div>
          <div class="field" style="grid-column: span 3;">
            <label for="issueMatter">事项名称</label>
            <div class="search-select">
              <input id="issueMatter" name="issueMatter" type="text" placeholder="输入关键字后选择事项">
              <div class="suggestion-panel" id="issueMatterSuggestion" hidden></div>
            </div>
          </div>
          <div class="field-actions" style="grid-column: span 3;">
            <button class="btn-primary" type="submit">执行统计</button>
            <button class="btn-secondary" type="button" id="issueExportBtn">导出结果</button>
            <button class="btn-secondary" type="button" id="issueResetBtn">重置条件</button>
          </div>
        </div>
      </form>
      <div class="range-note" id="rangeNote"></div>
    </section>

    <section class="panel-card">
      <div class="panel-card-head">
        <div>
          <h3>事项办理统计明细</h3>
          <p id="tableDescription"></p>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>序号</th>
              <th id="dimensionHeader">分析对象</th>
              <th>受理待办/已办</th>
              <th>审核待办/已办</th>
              <th id="inspectionHeader">现场检查待办/已办</th>
              <th>决定待办/已办</th>
              <th id="bureauHeader">专业局审批待办/已办</th>
              <th>环节总量待办/已办</th>
            </tr>
          </thead>
          <tbody id="issueTableBody"></tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const issueStageMeta = [

    const sectorMatterRules = {

    const elements = {
      issueFilterForm: document.getElementById("issueFilterForm"),
      issueExportBtn: document.getElementById("issueExportBtn"),
      issueResetBtn: document.getElementById("issueResetBtn"),
      issueMatter: document.getElementById("issueMatter"),
      issueMatterSuggestion: document.getElementById("issueMatterSuggestion"),
      issueDimension: document.getElementById("issueDimension"),
      issueRegion: document.getElementById("issueRegion"),
      issueSector: document.getElementById("issueSector"),
      tableDescription: document.getElementById("tableDescription"),
      dimensionHeader: document.getElementById("dimensionHeader"),
      inspectionHeader: document.getElementById("inspectionHeader"),
      bureauHeader: document.getElementById("bureauHeader"),
      issueTableBody: document.getElementById("issueTableBody"),
      rangeNote: document.getElementById("rangeNote")
    };

    function toDate(value) {
      return value ? new Date(`${value}T00:00:00`) : null;
    }

    function normalizeDateKey(value) {
      return String(value || "").trim();
    }

    function formatNumber(value) {
      return value.toLocaleString("zh-CN");
    }

    function formatPercent(value) {
      return `${(value * 100).toFixed(1)}%`;
    }

    function getAcceptedTotal(item) {
      return (item.acceptedPending || 0) + (item.acceptedDone || 0);
    }

    function getReviewedTotal(item) {
      return (item.reviewedPending || 0) + (item.reviewedDone || 0);
    }

    function getDecidedTotal(item) {
      return (item.decidedPending || 0) + (item.decidedDone || 0);
    }

    function getInspectionTotal(item) {
      return (item.inspectionPending || 0) + (item.inspectionDone || 0);
    }

    function getBureauTotal(item) {
      return (item.bureauPending || 0) + (item.bureauDone || 0);
    }

    function getPendingTotal(item) {
      return (item.acceptedPending || 0) + (item.reviewedPending || 0) + (item.inspectionPending || 0) + (item.decidedPending || 0) + (item.bureauPending || 0);
    }

    function getDoneTotal(item) {
      return (item.acceptedDone || 0) + (item.reviewedDone || 0) + (item.inspectionDone || 0) + (item.decidedDone || 0) + (item.bureauDone || 0);
    }

    function getTotal(item) {
      return getAcceptedTotal(item) + getReviewedTotal(item) + getInspectionTotal(item) + getDecidedTotal(item) + getBureauTotal(item);
    }

    function getStagePendingTotal(item) {
      return (item.acceptedPending || 0) + (item.reviewedPending || 0) + (item.inspectionPending || 0) + (item.decidedPending || 0);
    }

    function getStageDoneTotal(item) {
      return (item.acceptedDone || 0) + (item.reviewedDone || 0) + (item.inspectionDone || 0) + (item.decidedDone || 0);
    }

    function getStageTotal(item) {
      return getAcceptedTotal(item) + getReviewedTotal(item) + getInspectionTotal(item) + getDecidedTotal(item);
    }

    function supportsInspection(item) {
      return item.matter.includes("安全生产许可证");
    }

    function formatStagePair(pending, done, enabled = true, note = "待办/已办") {
      if (!enabled) {
        return `<span class="cell-sub">不适用</span>`;
      }

      return `${formatNumber(pending || 0)}/${formatNumber(done || 0)}<span class="cell-sub">${note}</span>`;
    }

    function fillOptions(select, values) {
      const options = values
        .sort((a, b) => a.localeCompare(b, "zh-CN"))
        .map((value) => `<option value="${value}">${value}</option>`)
        .join("");
      select.insertAdjacentHTML("beforeend", options);
    }

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, "")
        .toLowerCase();
    }

    const matterOptions = [...new Set(issueRecords.map((record) => record.matter))]
      .sort((a, b) => a.localeCompare(b, "zh-CN"));

    function getMatterSuggestionList(keyword) {
      const normalizedKeyword = normalizeText(keyword);
      const matched = normalizedKeyword
        ? matterOptions.filter((item) => normalizeText(item).includes(normalizedKeyword))
        : matterOptions;
      return matched.slice(0, 12);
    }

    function renderMatterSuggestions(keyword = "") {
      const matched = getMatterSuggestionList(keyword);

      if (!matched.length) {
        elements.issueMatterSuggestion.innerHTML = `<div class="suggestion-empty">没有匹配事项</div>`;
        elements.issueMatterSuggestion.hidden = false;
        return;
      }

      elements.issueMatterSuggestion.innerHTML = matched
        .map((item) => `<button class="suggestion-item" type="button" data-value="${item}">${item}</button>`)
        .join("");
      elements.issueMatterSuggestion.hidden = false;
    }

    function closeMatterSuggestions() {
      elements.issueMatterSuggestion.hidden = true;
    }

    function initMatterAutocomplete() {
      elements.issueMatter.addEventListener("focus", () => {
        renderMatterSuggestions(elements.issueMatter.value);
      });

      elements.issueMatter.addEventListener("input", () => {
        renderMatterSuggestions(elements.issueMatter.value);
      });

      elements.issueMatter.addEventListener("blur", () => {
        window.setTimeout(() => {
          closeMatterSuggestions();
        }, 120);
      });

      elements.issueMatterSuggestion.addEventListener("click", (event) => {
        const target = event.target.closest("[data-value]");
        if (!target) return;
        elements.issueMatter.value = target.dataset.value;
        closeMatterSuggestions();
      });
    }

    function matchesMatterFilter(recordMatter, filterMatter) {
      if (!filterMatter) return true;

      const normalizedFilter = normalizeText(filterMatter);
      const normalizedMatter = normalizeText(recordMatter);

      return normalizedMatter === normalizedFilter || normalizedMatter.includes(normalizedFilter);
    }

    function getSector(record) {
      if (sectorMatterRules.safety.some((keyword) => record.matter.includes(keyword))) {
        return "安全证板块";
      }

      if (sectorMatterRules.supervision.some((keyword) => record.matter.includes(keyword))) {
        return "监理板块";
      }

      if (sectorMatterRules.construction.some((keyword) => record.matter.includes(keyword))) {
        return "建筑板块";
      }

      return "建筑板块";
    }

    function getDimensionMeta(dimension) {
      const metaMap = {
        case: { label: "按办件", header: "事项名称" },
        district: { label: "按区县", header: "区县名称" },
        sector: { label: "按板块", header: "板块 / 事项" }
      };
      return metaMap[dimension] || metaMap.case;
    }

    function shouldShowInspectionColumn(filters) {
      return !["建筑板块", "监理板块"].includes(filters.sector);
    }

    function shouldShowBureauColumn(filters) {
      return !["监理板块", "安全证板块"].includes(filters.sector);
    }

    function getFilters() {
      const formData = new FormData(elements.issueFilterForm);
      return {
        startDate: formData.get("issueStartDate"),
        endDate: formData.get("issueEndDate"),
        matter: (formData.get("issueMatter") || "").trim(),
        dimension: formData.get("issueDimension") || "case",
        region: formData.get("issueRegion"),
        sector: formData.get("issueSector")
      };
    }

    function filterIssueRecords() {
      const filters = getFilters();
      let startDate = normalizeDateKey(filters.startDate);
      let endDate = normalizeDateKey(filters.endDate);

      if (startDate && endDate && startDate > endDate) {
        [startDate, endDate] = [endDate, startDate];
      }

      return issueRecords.filter((record) => {
        const currentDate = normalizeDateKey(record.finishedDate);
        const sector = getSector(record);
        if (startDate && currentDate < startDate) return false;
        if (endDate && currentDate > endDate) return false;
        if (!matchesMatterFilter(record.matter, filters.matter)) return false;
        if (filters.region && record.region !== filters.region) return false;
        if (filters.sector && sector !== filters.sector) return false;
        return true;
      });
    }

    function compareBySort() {
      return (a, b) => {
        return getStageTotal(b) - getStageTotal(a) || b.recordCount - a.recordCount;
      };
    }

    function aggregateIssueRecords(records, dimension) {
      const grouped = new Map();

      records.forEach((record) => {
        const sector = getSector(record);
        const groupKey = dimension === "district"
          ? record.region
          : dimension === "sector"
            ? `${sector}__${record.matter}`
            : record.matter;
        const displayName = dimension === "district"
          ? record.region
          : dimension === "sector"
            ? `${sector} / ${record.matter}`
            : record.matter;

        if (!grouped.has(groupKey)) {
          grouped.set(groupKey, {
            matter: record.matter,
            region: record.region,
            sector,
            displayName,
            recordCount: 0,
            acceptedPending: 0,
            acceptedDone: 0,
            reviewedPending: 0,
            reviewedDone: 0,
            inspectionPending: 0,
            inspectionDone: 0,
            decidedPending: 0,
            decidedDone: 0,
            bureauPending: 0,
            bureauDone: 0,
            latestDate: record.finishedDate,
            regions: new Set()
          });
        }

        const bucket = grouped.get(groupKey);
        bucket.recordCount += 1;
        bucket.acceptedPending += record.acceptedPending;
        bucket.acceptedDone += record.acceptedDone;
        bucket.reviewedPending += record.reviewedPending;
        bucket.reviewedDone += record.reviewedDone;
        bucket.inspectionPending += record.inspectionPending || 0;
        bucket.inspectionDone += record.inspectionDone || 0;
        bucket.decidedPending += record.decidedPending;
        bucket.decidedDone += record.decidedDone;
        bucket.bureauPending += record.bureauPending;
        bucket.bureauDone += record.bureauDone;
        bucket.regions.add(record.region);
        if (record.finishedDate > bucket.latestDate) {
          bucket.latestDate = record.finishedDate;
        }
      });

      return [...grouped.values()]
        .map((item) => ({
          ...item,
          regionCount: item.regions.size,
          regionNames: [...item.regions].sort((a, b) => a.localeCompare(b, "zh-CN"))
        }))
        .sort(compareBySort());
    }

    function aggregateDimensionSummary(records, dimension) {
      const grouped = new Map();

      records.forEach((record) => {
        const sector = getSector(record);
        const groupKey = dimension === "district"
          ? record.region
          : dimension === "sector"
            ? sector
            : record.matter;
        const displayName = groupKey;

        if (!grouped.has(groupKey)) {
          grouped.set(groupKey, {
            displayName,
            recordCount: 0,
            acceptedPending: 0,
            acceptedDone: 0,
            reviewedPending: 0,
            reviewedDone: 0,
            inspectionPending: 0,
            inspectionDone: 0,
            decidedPending: 0,
            decidedDone: 0,
            bureauPending: 0,
            bureauDone: 0
          });
        }

        const bucket = grouped.get(groupKey);
        bucket.recordCount += 1;
        bucket.acceptedPending += record.acceptedPending || 0;
        bucket.acceptedDone += record.acceptedDone || 0;
        bucket.reviewedPending += record.reviewedPending || 0;
        bucket.reviewedDone += record.reviewedDone || 0;
        bucket.inspectionPending += record.inspectionPending || 0;
        bucket.inspectionDone += record.inspectionDone || 0;
        bucket.decidedPending += record.decidedPending || 0;
        bucket.decidedDone += record.decidedDone || 0;
        bucket.bureauPending += record.bureauPending || 0;
        bucket.bureauDone += record.bureauDone || 0;
      });

      return [...grouped.values()];
    }

    function aggregateRegionRecords(records) {
      const grouped = new Map();

      records.forEach((record) => {
        if (!grouped.has(record.region)) {
          grouped.set(record.region, {
            region: record.region,
            recordCount: 0,
            acceptedPending: 0,
            acceptedDone: 0,
            reviewedPending: 0,
            reviewedDone: 0,
            inspectionPending: 0,
            inspectionDone: 0,
            decidedPending: 0,
            decidedDone: 0,
            bureauPending: 0,
            bureauDone: 0,
            latestDate: record.finishedDate,
            matterTotals: new Map()
          });
        }

        const bucket = grouped.get(record.region);
        const total = getStageTotal(record);
        bucket.recordCount += 1;
        bucket.acceptedPending += record.acceptedPending;
        bucket.acceptedDone += record.acceptedDone;
        bucket.reviewedPending += record.reviewedPending;
        bucket.reviewedDone += record.reviewedDone;
        bucket.inspectionPending += record.inspectionPending || 0;
        bucket.inspectionDone += record.inspectionDone || 0;
        bucket.decidedPending += record.decidedPending;
        bucket.decidedDone += record.decidedDone;
        bucket.bureauPending += record.bureauPending;
        bucket.bureauDone += record.bureauDone;
        if (record.finishedDate > bucket.latestDate) {
          bucket.latestDate = record.finishedDate;
        }
        bucket.matterTotals.set(record.matter, (bucket.matterTotals.get(record.matter) || 0) + total);
      });

      return [...grouped.values()]
        .map((item) => {
          const topMatterEntry = [...item.matterTotals.entries()].sort((a, b) => b[1] - a[1])[0];
          return {
            ...item,
            total: getStageTotal(item),
            topMatter: topMatterEntry ? topMatterEntry[0] : "-"
          };
        })
        .sort((a, b) => b.total - a.total || b.recordCount - a.recordCount);
    }

    function getStageTotals(aggregated) {
      return aggregated.reduce((sum, item) => {
        sum.accepted += getAcceptedTotal(item);
        sum.reviewed += getReviewedTotal(item);
        sum.inspection += getInspectionTotal(item);
        sum.decided += getDecidedTotal(item);
        sum.bureau += getBureauTotal(item);
        return sum;
      }, { accepted: 0, reviewed: 0, inspection: 0, decided: 0, bureau: 0 });
    }

    function getPendingStageTotals(aggregated) {
      return aggregated.reduce((sum, item) => {
        sum.reviewed += item.reviewedPending || 0;
        sum.inspection += item.inspectionPending || 0;
        sum.decided += item.decidedPending || 0;
        sum.bureau += item.bureauPending || 0;
        return sum;
      }, { reviewed: 0, inspection: 0, decided: 0, bureau: 0 });
    }

    function buildEmptyRow(colspan, text) {
      return `<tr><td colspan="${colspan}"><div class="empty-state">${text}</div></td></tr>`;
    }

    function escapeCsv(value) {
      const text = String(value ?? "");
      return `"${text.replace(/"/g, "\"\"")}"`;
    }

    function exportIssueResults() {
      const filters = getFilters();
      const filtered = filterIssueRecords();
      const aggregated = aggregateIssueRecords(filtered, filters.dimension);
      const showInspectionColumn = shouldShowInspectionColumn(filters);
      const showBureauColumn = shouldShowBureauColumn(filters);
      const header = ["序号", getDimensionMeta(filters.dimension).header, "受理待办/已办", "审核待办/已办"];

      if (showInspectionColumn) {
        header.push("现场检查待办/已办");
      }

      header.push("决定待办/已办");

      if (showBureauColumn) {
        header.push("专业局审批待办/已办");
      }

      header.push("环节总量待办/已办");

      const rows = aggregated.map((item, index) => {
        const row = [
          index + 1,
          item.displayName,
          `${item.acceptedPending}/${item.acceptedDone}`,
          `${item.reviewedPending}/${item.reviewedDone}`
        ];

        if (showInspectionColumn) {
          row.push(supportsInspection(item) ? `${item.inspectionPending}/${item.inspectionDone}` : "不适用");
        }

        row.push(`${item.decidedPending}/${item.decidedDone}`);

        if (showBureauColumn) {
          row.push(`${item.bureauPending}/${item.bureauDone}`);
        }

        row.push(`${getStagePendingTotal(item)}/${getStageDoneTotal(item)}`);

        return row;
      });

      const csvContent = [header, ...rows]
        .map((row) => row.map((cell) => escapeCsv(cell)).join(","))
        .join("\r\n");

      const blob = new Blob([`\uFEFF${csvContent}`], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      const today = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `事项环节分析-${today}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function renderTableDescription(filters) {
      const showInspectionColumn = shouldShowInspectionColumn(filters);
      const inspectionText = showInspectionColumn
        ? "现场检查列仅对安全生产许可证相关事项展示有效数据。"
        : "当前板块不涉及现场检查，表格已隐藏该列。";

      const description = filters.dimension === "district"
        ? `按区县汇总展示本区全部板块、全部事项在各环节的待办/已办数量。${inspectionText}`
        : filters.dimension === "sector"
          ? `按板块展示当前范围内各事项的环节汇总；${filters.sector ? `当前已限定为“${filters.sector}”板块。` : "当前未限定板块，将按事项所属板块分别汇总。"}${inspectionText}`
          : `按事项汇总展示各环节待办/已办数量，可结合区县、事项关键字筛选查看具体办理情况。${inspectionText}`;

      elements.tableDescription.textContent = description;
    }

    function renderIssueTable(aggregated, dimension) {
      const filters = getFilters();
      const showInspectionColumn = shouldShowInspectionColumn(filters);
      const showBureauColumn = shouldShowBureauColumn(filters);
      elements.dimensionHeader.textContent = getDimensionMeta(dimension).header;
      elements.inspectionHeader.style.display = showInspectionColumn ? "" : "none";
      elements.bureauHeader.style.display = showBureauColumn ? "" : "none";

      if (!aggregated.length) {
        const colspan = 6 + (showInspectionColumn ? 1 : 0) + (showBureauColumn ? 1 : 0);
        elements.issueTableBody.innerHTML = buildEmptyRow(colspan, "当前条件下没有事项办理统计结果。");
        return;
      }

      const rows = aggregated.map((item, index) => {
        const inspectionCell = showInspectionColumn ? `
            <td class="center-cell">
              ${formatStagePair(item.inspectionPending, item.inspectionDone, supportsInspection(item))}
            </td>` : "";
        const bureauCell = showBureauColumn ? `
            <td class="center-cell">
              ${formatStagePair(item.bureauPending, item.bureauDone)}
            </td>` : "";

        return `
          <tr>
            <td class="center-cell">${index + 1}</td>
            <td>
              ${item.displayName}
              <span class="cell-sub">按环节总量排序第 ${index + 1} 位</span>
            </td>
            <td class="center-cell">
              ${formatStagePair(item.acceptedPending, item.acceptedDone)}
            </td>
            <td class="center-cell">
              ${formatStagePair(item.reviewedPending, item.reviewedDone)}
            </td>
            ${inspectionCell}
            <td class="center-cell">
              ${formatStagePair(item.decidedPending, item.decidedDone)}
            </td>
            ${bureauCell}
            <td class="center-cell">
              ${formatStagePair(getStagePendingTotal(item), getStageDoneTotal(item), true, "总待办/总已办")}
            </td>
          </tr>
        `;
      });

      if (dimension === "case") {
        const totals = aggregated.reduce((sum, item) => {
          sum.acceptedPending += item.acceptedPending || 0;
          sum.acceptedDone += item.acceptedDone || 0;
          sum.reviewedPending += item.reviewedPending || 0;
          sum.reviewedDone += item.reviewedDone || 0;
          sum.inspectionPending += item.inspectionPending || 0;
          sum.inspectionDone += item.inspectionDone || 0;
          sum.decidedPending += item.decidedPending || 0;
          sum.decidedDone += item.decidedDone || 0;
          sum.bureauPending += item.bureauPending || 0;
          sum.bureauDone += item.bureauDone || 0;
          return sum;
        }, {
          acceptedPending: 0,
          acceptedDone: 0,
          reviewedPending: 0,
          reviewedDone: 0,
          inspectionPending: 0,
          inspectionDone: 0,
          decidedPending: 0,
          decidedDone: 0,
          bureauPending: 0,
          bureauDone: 0
        });

        const totalInspectionCell = showInspectionColumn ? `
            <td class="center-cell">
              ${formatStagePair(totals.inspectionPending, totals.inspectionDone)}
            </td>` : "";
        const totalBureauCell = showBureauColumn ? `
            <td class="center-cell">
              ${formatStagePair(totals.bureauPending, totals.bureauDone)}
            </td>` : "";

        rows.push(`
          <tr>
            <td class="center-cell">-</td>
            <td>
              合计
              <span class="cell-sub">当前按办件统计结果汇总</span>
            </td>
            <td class="center-cell">
              ${formatStagePair(totals.acceptedPending, totals.acceptedDone)}
            </td>
            <td class="center-cell">
              ${formatStagePair(totals.reviewedPending, totals.reviewedDone)}
            </td>
            ${totalInspectionCell}
            <td class="center-cell">
              ${formatStagePair(totals.decidedPending, totals.decidedDone)}
            </td>
            ${totalBureauCell}
            <td class="center-cell">
              ${formatStagePair(
                totals.acceptedPending + totals.reviewedPending + totals.inspectionPending + totals.decidedPending,
                totals.acceptedDone + totals.reviewedDone + totals.inspectionDone + totals.decidedDone,
                true,
                "总待办/总已办"
              )}
            </td>
          </tr>
        `);
      }

      elements.issueTableBody.innerHTML = rows.join("");
    }

    function renderRangeNote(records, aggregated, regionSummary, dimension) {
      elements.rangeNote.textContent = "";
    }

    function renderPage() {
      const filters = getFilters();
      const filtered = filterIssueRecords();
      const aggregated = aggregateIssueRecords(filtered, filters.dimension);
      const regionSummary = aggregateRegionRecords(filtered);

      renderTableDescription(filters);
      renderIssueTable(aggregated, filters.dimension);
      renderRangeNote(filtered, aggregated, regionSummary, filters.dimension);
    }

    function init() {
      fillOptions(elements.issueRegion, [...new Set(issueRecords.map((record) => record.region))]);
      initMatterAutocomplete();

      elements.issueFilterForm.addEventListener("submit", (event) => {
        event.preventDefault();
        renderPage();
      });

      elements.issueResetBtn.addEventListener("click", () => {
        elements.issueFilterForm.reset();
        renderPage();
      });

      elements.issueExportBtn.addEventListener("click", () => {
        exportIssueResults();
      });

      renderPage();
    }

    init();
  </script>
</body>
</html>
