<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>安全证办事明细</title>
  <style>
    :root {
      --panel: rgba(255, 255, 255, 0.9);
      --line: rgba(25, 58, 87, 0.1);
      --text: #1b3147;
      --muted: #667a8f;
      --primary: #1685b8;
      --teal: #1e9b82;
      --amber: #f19a34;
      --danger: #df6a49;
      --shadow: 0 22px 54px rgba(15, 35, 55, 0.1);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 0% 0%, rgba(22, 133, 184, 0.16), transparent 24%),
        radial-gradient(circle at 100% 16%, rgba(241, 154, 52, 0.12), transparent 20%),
        linear-gradient(180deg, #f7fafc 0%, #edf2f6 44%, #e7edf3 100%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(12, 35, 58, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(12, 35, 58, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 92%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page-shell {
      width: min(1540px, calc(100vw - 28px));
      margin: 14px auto;
      padding: 14px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(246, 249, 252, 0.94)),
        rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .page-shell::after {
      content: "";
      position: absolute;
      inset: -90px auto auto -80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22, 133, 184, 0.16), transparent 72%);
      pointer-events: none;
    }

    .hero,
    .section-panel,
    .panel-card {
      position: relative;
      z-index: 1;
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
    }

    .hero,
    .section-panel {
      border-radius: var(--radius-xl);
      padding: 14px;
    }

    .hero {
      margin-bottom: 10px;
      background:
        linear-gradient(135deg, rgba(14, 50, 78, 0.98), rgba(10, 113, 151, 0.92) 56%, rgba(18, 148, 126, 0.84));
      color: #eef8ff;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -80px -90px auto;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 70%);
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #e2f7ff;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero h1 {
      margin: 8px 0 6px;
      font-size: clamp(1.48rem, 2.8vw, 2.3rem);
      line-height: 1.08;
      letter-spacing: 0.02em;
    }

    .hero p {
      margin: 0;
      color: rgba(232, 245, 255, 0.86);
      font-size: 0.85rem;
      line-height: 1.58;
    }

    .hero-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .hero-chip,
    .hero-link {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      background: rgba(255, 255, 255, 0.12);
      color: #f4fbff;
      font-size: 0.74rem;
      text-decoration: none;
    }

    .hero-link {
      background: rgba(255, 255, 255, 0.18);
      transition: transform 0.18s ease, background 0.18s ease;
    }

    .hero-link:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.24);
    }

    .section-panel {
      margin-bottom: 10px;
      overflow: visible;
      z-index: 4;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    .field label {
      font-size: 0.76rem;
      font-weight: 700;
      color: var(--muted);
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 40px;
      padding: 0 12px;
      border-radius: 12px;
      border: 1px solid rgba(25, 58, 87, 0.12);
      background: rgba(255, 255, 255, 0.9);
      color: var(--text);
    }

    .field-actions {
      display: flex;
      align-items: end;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-primary,
    .btn-secondary {
      min-width: 100px;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #1da2dd, #147ca7);
      box-shadow: 0 12px 20px rgba(22, 133, 184, 0.18);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid rgba(25, 58, 87, 0.18);
    }

    .search-select {
      position: relative;
      z-index: 6;
    }

    .suggestion-panel {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      max-height: 280px;
      overflow: auto;
      padding: 6px;
      border-radius: 14px;
      border: 1px solid rgba(25, 58, 87, 0.12);
      background: rgba(255, 255, 255, 0.98);
      box-shadow: 0 16px 28px rgba(15, 35, 55, 0.12);
    }

    .suggestion-panel[hidden] {
      display: none;
    }

    .suggestion-item,
    .suggestion-empty {
      width: 100%;
      min-height: 36px;
      padding: 8px 10px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: var(--text);
      text-align: left;
    }

    .suggestion-item:hover {
      background: rgba(22, 133, 184, 0.08);
    }

    .suggestion-empty {
      color: var(--muted);
      cursor: default;
    }

    .panel-card {
      border-radius: var(--radius-lg);
      padding: 12px;
      background: rgba(255, 255, 255, 0.72);
    }

    .panel-card-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .panel-card h3 {
      margin: 0;
      letter-spacing: 0.02em;
    }

    .panel-card p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.55;
    }

    .table-wrap {
      overflow: auto;
      max-height: calc(100vh - 320px);
      border-radius: 18px;
      border: 1px solid rgba(25, 58, 87, 0.08);
      background: rgba(255, 255, 255, 0.72);
    }

    table {
      width: 100%;
      min-width: 1900px;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 12px 10px;
      text-align: left;
      font-size: 0.8rem;
      color: #18384e;
      background: linear-gradient(180deg, rgba(214, 228, 238, 0.99), rgba(227, 237, 244, 0.99));
      border-bottom: 1px solid rgba(25, 58, 87, 0.14);
      box-shadow: inset 0 -1px 0 rgba(255, 255, 255, 0.45);
      white-space: nowrap;
    }

    thead .stage-head,
    thead .stage-subhead {
      text-align: center;
    }

    thead tr:first-child th {
      top: 0;
      background: linear-gradient(180deg, rgba(202, 220, 232, 0.99), rgba(217, 231, 240, 0.99));
      color: #143248;
    }

    thead tr:nth-child(2) th {
      top: 44px;
      z-index: 2;
      background: linear-gradient(180deg, rgba(236, 243, 247, 0.99), rgba(244, 248, 251, 0.99));
      color: #355065;
    }

    thead tr:first-child th:nth-child(7),
    thead tr:first-child th:nth-child(8),
    thead tr:first-child th:nth-child(9),
    thead tr:first-child th:nth-child(10),
    thead tr:first-child th:nth-child(11) {
      border-left: 1px solid rgba(25, 58, 87, 0.12);
    }

    thead tr:nth-child(2) th:nth-child(1),
    thead tr:nth-child(2) th:nth-child(4),
    thead tr:nth-child(2) th:nth-child(7),
    thead tr:nth-child(2) th:nth-child(10) {
      border-left: 1px solid rgba(25, 58, 87, 0.12);
    }

    thead tr:nth-child(2) th:nth-child(3),
    thead tr:nth-child(2) th:nth-child(6),
    thead tr:nth-child(2) th:nth-child(9),
    thead tr:nth-child(2) th:nth-child(12) {
      border-right: 1px solid rgba(25, 58, 87, 0.12);
    }

    tbody td {
      padding: 12px 10px;
      border-bottom: 1px solid rgba(25, 58, 87, 0.08);
      font-size: 0.8rem;
      vertical-align: top;
      background: rgba(255, 255, 255, 0.82);
    }

    tbody tr:nth-child(even) td {
      background: rgba(247, 250, 252, 0.92);
    }

    tbody td:nth-child(6),
    tbody td:nth-child(9),
    tbody td:nth-child(12),
    tbody td:nth-child(15),
    tbody td:nth-child(18),
    tbody td:nth-child(19),
    tbody td:nth-child(20) {
      border-left: 1px solid rgba(25, 58, 87, 0.08);
    }

    tbody td:nth-child(8),
    tbody td:nth-child(11),
    tbody td:nth-child(14),
    tbody td:nth-child(17) {
      border-right: 1px solid rgba(25, 58, 87, 0.08);
    }

    tbody tr:hover td {
      background: rgba(255, 244, 224, 0.96);
    }

    .center-cell {
      text-align: center;
    }

    .cell-sub {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 0.72rem;
    }

    .rectify-list {
      display: grid;
      gap: 6px;
    }

    .rectify-item {
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(22, 133, 184, 0.06);
      line-height: 1.5;
    }

    .rectify-item strong {
      color: var(--primary);
      font-size: 0.74rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      font-size: 0.74rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-done {
      background: rgba(30, 155, 130, 0.12);
      color: var(--teal);
    }

    .status-processing {
      background: rgba(22, 133, 184, 0.12);
      color: var(--primary);
    }

    .status-warning {
      background: rgba(241, 154, 52, 0.14);
      color: #c97814;
    }

    .status-danger {
      background: rgba(223, 106, 73, 0.14);
      color: var(--danger);
    }

    .empty-state {
      padding: 28px 18px;
      color: var(--muted);
      text-align: center;
    }

    .table-pagination {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .page-indicator {
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .page-btn {
      min-width: 88px;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid rgba(25, 58, 87, 0.12);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font-weight: 700;
    }

    .page-btn:disabled {
      cursor: default;
      opacity: 0.45;
    }

    @media (max-width: 960px) {
      .filter-grid {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .field-actions {
        grid-column: span 6 !important;
        flex-wrap: wrap;
      }
    }

    @media (max-width: 720px) {
      .page-shell {
        width: min(100vw - 16px, 100%);
        margin: 8px auto;
        padding: 10px;
        border-radius: 22px;
      }

      .hero,
      .section-panel {
        padding: 12px;
      }

      .filter-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .field,
      .field-actions {
        grid-column: span 2 !important;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero">
      <span class="hero-tag">Safety Detail</span>
      <h1>安全证办事明细</h1>
      <p>按企业维度展示安全生产许可证事项的办件明细，覆盖受理、审核、现场检查、决定四个环节的办理轨迹，支持按企业、事项、状态、受理人、审核人、决定人、核查人筛选并导出当前结果。</p>
      <div class="hero-chips">
        <span class="hero-chip">企业办件明细</span>
        <span class="hero-chip">环节审批轨迹</span>
        <span class="hero-chip">当前结果导出</span>
      </div>
      <div class="hero-chips">
        <a class="hero-link" href="index.html">返回分析首页</a>
        <a class="hero-link" href="matter-analysis.html">返回事项分析</a>
      </div>
    </header>

    <section class="section-panel">
      <form id="detailFilterForm">
        <div class="filter-grid">
          <div class="field" style="grid-column: span 2;">
            <label for="startDate">决定开始时间</label>
            <input id="startDate" name="startDate" type="date">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="endDate">决定结束时间</label>
            <input id="endDate" name="endDate" type="date">
          </div>
          <div class="field" style="grid-column: span 3;">
            <label for="companyName">企业名称</label>
            <div class="search-select">
              <input id="companyName" name="companyName" type="text" placeholder="输入企业关键字后选择">
              <div class="suggestion-panel" id="companySuggestion" hidden></div>
            </div>
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="matterName">事项名称</label>
            <div class="search-select">
              <input id="matterName" name="matterName" type="text" placeholder="输入事项关键字后选择">
              <div class="suggestion-panel" id="matterSuggestion" hidden></div>
            </div>
          </div>
          <div class="field" style="grid-column: span 1;">
            <label for="statusName">办理状态</label>
            <select id="statusName" name="statusName">
              <option value="">全部状态</option>
            </select>
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="acceptedUser">受理人</label>
            <input id="acceptedUser" name="acceptedUser" type="text" placeholder="输入受理人">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="reviewedUser">审核人</label>
            <input id="reviewedUser" name="reviewedUser" type="text" placeholder="输入审核人">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="decisionUser">决定人</label>
            <input id="decisionUser" name="decisionUser" type="text" placeholder="输入决定人">
          </div>
          <div class="field" style="grid-column: span 2;">
            <label for="inspectionUser">核查人</label>
            <input id="inspectionUser" name="inspectionUser" type="text" placeholder="输入核查人">
          </div>
          <div class="field-actions" style="grid-column: span 4;">
            <button class="btn-primary" type="submit">执行统计</button>
            <button class="btn-secondary" type="button" id="exportBtn">导出结果</button>
            <button class="btn-secondary" type="button" id="resetBtn">重置条件</button>
          </div>
        </div>
      </form>
    </section>

    <section class="panel-card">
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th rowspan="2">序号</th>
              <th rowspan="2">企业名称</th>
              <th rowspan="2">事项名称</th>
              <th rowspan="2">事项编号</th>
              <th rowspan="2">最后提交时间</th>
              <th colspan="3" class="stage-head">受理</th>
              <th colspan="3" class="stage-head">审核</th>
              <th colspan="3" class="stage-head">决定</th>
              <th colspan="3" class="stage-head">现场检查</th>
              <th rowspan="2">考评结果</th>
              <th rowspan="2">材料补正</th>
              <th rowspan="2">当前状态</th>
            </tr>
            <tr>
              <th class="stage-subhead">受理人</th>
              <th class="stage-subhead">受理时间</th>
              <th class="stage-subhead">受理结果</th>
              <th class="stage-subhead">审批人</th>
              <th class="stage-subhead">审批时间</th>
              <th class="stage-subhead">审批结果</th>
              <th class="stage-subhead">决定人</th>
              <th class="stage-subhead">决定时间</th>
              <th class="stage-subhead">决定结果</th>
              <th class="stage-subhead">核查人</th>
              <th class="stage-subhead">核查时间</th>
              <th class="stage-subhead">核查结果</th>
            </tr>
          </thead>
          <tbody id="detailTableBody"></tbody>
        </table>
      </div>
      <div class="table-pagination">
        <span class="page-indicator" id="pageIndicator">第 1 / 1 页</span>
        <button class="page-btn" type="button" id="prevPageBtn">上一页</button>
        <button class="page-btn" type="button" id="nextPageBtn">下一页</button>
      </div>
    </section>
  </div>

        decision: { approver: "王捷", time: "2026-05-23 11:12", result: "准予许可" },

      }
    ];

    const stageKeys = ["accepted", "reviewed", "inspection", "decision"];

    const elements = {
      detailFilterForm: document.getElementById("detailFilterForm"),
      startDate: document.getElementById("startDate"),
      endDate: document.getElementById("endDate"),
      companyName: document.getElementById("companyName"),
      companySuggestion: document.getElementById("companySuggestion"),
      matterName: document.getElementById("matterName"),
      matterSuggestion: document.getElementById("matterSuggestion"),
      statusName: document.getElementById("statusName"),
      acceptedUser: document.getElementById("acceptedUser"),
      reviewedUser: document.getElementById("reviewedUser"),
      decisionUser: document.getElementById("decisionUser"),
      inspectionUser: document.getElementById("inspectionUser"),
      exportBtn: document.getElementById("exportBtn"),
      resetBtn: document.getElementById("resetBtn"),
      detailTableBody: document.getElementById("detailTableBody"),
      pageIndicator: document.getElementById("pageIndicator"),
      prevPageBtn: document.getElementById("prevPageBtn"),
      nextPageBtn: document.getElementById("nextPageBtn")
    };

    const companyOptions = [...new Set(detailRecords.map((item) => item.company))]
      .sort((a, b) => a.localeCompare(b, "zh-CN"));
    const matterOptions = [...new Set(detailRecords.map((item) => item.matter))]
      .sort((a, b) => a.localeCompare(b, "zh-CN"));
    const matterCodeMap = {
      "建筑施工企业安全生产许可证首次申请": "AQXK-001",
      "建筑施工企业安全生产许可证延期需审查": "AQXK-002",
      "建筑施工企业安全生产许可证变更": "AQXK-003",
      "建筑施工企业安全生产许可证延期不审查": "AQXK-004",
      "建筑施工企业安全生产许可证重新核定": "AQXK-005",
      "建筑施工企业安全生产许可证经济类型变更": "AQXK-006"
    };
    const pageSize = 20;
    let currentPage = 1;
    let currentFilteredRecords = [...detailRecords];

    function normalizeText(value) {
      return String(value || "")
        .trim()
        .replace(/\s+/g, "")
        .toLowerCase();
    }

    function normalizeDateKey(value) {
      return String(value || "").trim();
    }

    function fillOptions(select, values) {
      const options = values
        .sort((a, b) => a.localeCompare(b, "zh-CN"))
        .map((value) => `<option value="${value}">${value}</option>`)
        .join("");
      select.insertAdjacentHTML("beforeend", options);
    }

    function getFilters() {
      const formData = new FormData(elements.detailFilterForm);
      return {
        startDate: normalizeDateKey(formData.get("startDate")),
        endDate: normalizeDateKey(formData.get("endDate")),
        company: String(formData.get("companyName") || "").trim(),
        matter: String(formData.get("matterName") || "").trim(),
        status: formData.get("statusName"),
        acceptedUser: String(formData.get("acceptedUser") || "").trim(),
        reviewedUser: String(formData.get("reviewedUser") || "").trim(),
        decisionUser: String(formData.get("decisionUser") || "").trim(),
        inspectionUser: String(formData.get("inspectionUser") || "").trim()
      };
    }

    function matchesCompanyFilter(company, filterCompany) {
      if (!filterCompany) return true;
      const current = normalizeText(company);
      const target = normalizeText(filterCompany);
      return current === target || current.includes(target);
    }

    function matchesKeyword(value, keyword) {
      if (!keyword) return true;
      return normalizeText(value).includes(normalizeText(keyword));
    }

    function filterRecords() {
      const filters = getFilters();
      let startDate = filters.startDate;
      let endDate = filters.endDate;

      if (startDate && endDate && startDate > endDate) {
        [startDate, endDate] = [endDate, startDate];
      }

      return detailRecords.filter((record) => {
        const currentDate = normalizeDateKey((record.decision.time || "").slice(0, 10));
        if (startDate && currentDate < startDate) return false;
        if (endDate && currentDate > endDate) return false;
        if (!matchesCompanyFilter(record.company, filters.company)) return false;
        if (filters.matter && !normalizeText(record.matter).includes(normalizeText(filters.matter))) return false;
        if (filters.status && record.status !== filters.status) return false;
        if (!matchesKeyword(record.accepted.approver, filters.acceptedUser)) return false;
        if (!matchesKeyword(record.reviewed.approver, filters.reviewedUser)) return false;
        if (!matchesKeyword(record.decision.approver, filters.decisionUser)) return false;
        if (!matchesKeyword(record.inspection.approver, filters.inspectionUser)) return false;
        return true;
      });
    }

    function getCompanySuggestionList(keyword) {
      const normalizedKeyword = normalizeText(keyword);
      const matched = normalizedKeyword
        ? companyOptions.filter((item) => normalizeText(item).includes(normalizedKeyword))
        : companyOptions;
      return matched.slice(0, 12);
    }

    function renderCompanySuggestions(keyword = "") {
      const matched = getCompanySuggestionList(keyword);

      if (!matched.length) {
        elements.companySuggestion.innerHTML = `<div class="suggestion-empty">没有匹配企业</div>`;
        elements.companySuggestion.hidden = false;
        return;
      }

      elements.companySuggestion.innerHTML = matched
        .map((item) => `<button class="suggestion-item" type="button" data-value="${item}">${item}</button>`)
        .join("");
      elements.companySuggestion.hidden = false;
    }

    function getMatterSuggestionList(keyword) {
      const normalizedKeyword = normalizeText(keyword);
      const matched = normalizedKeyword
        ? matterOptions.filter((item) => normalizeText(item).includes(normalizedKeyword))
        : matterOptions;
      return matched.slice(0, 12);
    }

    function renderMatterSuggestions(keyword = "") {
      const matched = getMatterSuggestionList(keyword);

      if (!matched.length) {
        elements.matterSuggestion.innerHTML = `<div class="suggestion-empty">没有匹配事项</div>`;
        elements.matterSuggestion.hidden = false;
        return;
      }

      elements.matterSuggestion.innerHTML = matched
        .map((item) => `<button class="suggestion-item" type="button" data-value="${item}">${item}</button>`)
        .join("");
      elements.matterSuggestion.hidden = false;
    }

    function closeCompanySuggestions() {
      elements.companySuggestion.hidden = true;
    }

    function closeMatterSuggestions() {
      elements.matterSuggestion.hidden = true;
    }

    function formatStageCell(value) {
      return value ? value : `<span class="cell-sub">-</span>`;
    }

    function formatStatusClass(status) {
      if (status === "已办结") return "status-done";
      if (status === "补正中" || status === "决定中") return "status-warning";
      if (status === "已退回") return "status-danger";
      return "status-processing";
    }

    function buildEmptyRow() {
      return `<tr><td colspan="20"><div class="empty-state">当前条件下没有安全证办事明细。</div></td></tr>`;
    }

    function getMatterCode(matter) {
      return matterCodeMap[matter] || "-";
    }

    function formatRectifications(rectifications) {
      if (!rectifications || !rectifications.length) {
        return `<span class="cell-sub">无补正</span>`;
      }

      return `<div class="rectify-list">${rectifications.map((item, index) => `
        <div class="rectify-item">
          <strong>第 ${index + 1} 次</strong>
          <div>${item.time}</div>
          <div>${item.result}</div>
          <div class="cell-sub">${item.note}</div>
        </div>
      `).join("")}</div>`;
    }

    function renderPagination(totalCount) {
      const totalPages = Math.max(1, Math.ceil(totalCount / pageSize));
      currentPage = Math.min(currentPage, totalPages);
      elements.pageIndicator.textContent = `第 ${currentPage} / ${totalPages} 页`;
      elements.prevPageBtn.disabled = currentPage <= 1;
      elements.nextPageBtn.disabled = currentPage >= totalPages;
      elements.pageIndicator.parentElement.hidden = totalCount === 0;
    }

    function renderTable(records) {
      currentFilteredRecords = [...records];

      if (!records.length) {
        elements.detailTableBody.innerHTML = buildEmptyRow();
        renderPagination(0);
        return;
      }

      const startIndex = (currentPage - 1) * pageSize;
      const pagedRecords = records.slice(startIndex, startIndex + pageSize);

      elements.detailTableBody.innerHTML = pagedRecords.map((record, index) => `
        <tr>
          <td class="center-cell">${startIndex + index + 1}</td>
          <td>${record.company}</td>
          <td>${record.matter}</td>
          <td class="center-cell">${getMatterCode(record.matter)}</td>
          <td class="center-cell">${record.submitDate}</td>
          <td class="center-cell">${formatStageCell(record.accepted.approver)}</td>
          <td class="center-cell">${formatStageCell(record.accepted.time)}</td>
          <td class="center-cell">${formatStageCell(record.accepted.result)}</td>
          <td class="center-cell">${formatStageCell(record.reviewed.approver)}</td>
          <td class="center-cell">${formatStageCell(record.reviewed.time)}</td>
          <td class="center-cell">${formatStageCell(record.reviewed.result)}</td>
          <td class="center-cell">${formatStageCell(record.decision.approver)}</td>
          <td class="center-cell">${formatStageCell(record.decision.time)}</td>
          <td class="center-cell">${formatStageCell(record.decision.result)}</td>
          <td class="center-cell">${formatStageCell(record.inspection.approver)}</td>
          <td class="center-cell">${formatStageCell(record.inspection.time)}</td>
          <td class="center-cell">${formatStageCell(record.inspection.result)}</td>
          <td class="center-cell">${record.evaluationResult || "-"}</td>
          <td>${formatRectifications(record.rectifications)}</td>
          <td class="center-cell"><span class="status-pill ${formatStatusClass(record.status)}">${record.status}</span></td>
        </tr>
      `).join("");
      renderPagination(records.length);
    }

    function escapeCsv(value) {
      const text = String(value ?? "");
      return `"${text.replace(/"/g, "\"\"")}"`;
    }

    function exportResults() {
      const rows = filterRecords();
      const header = [
        "序号", "企业名称", "事项名称", "事项编号", "最后提交时间",
        "受理人", "受理时间", "受理结果",
        "审核人", "审核时间", "审核结果",
        "决定人", "决定时间", "决定结果",
        "核查人", "核查时间", "核查结果",
        "考评结果",
        "材料补正",
        "当前状态"
      ];

      const body = rows.map((item, index) => [
        index + 1,
        item.company,
        item.matter,
        getMatterCode(item.matter),
        item.submitDate,
        item.accepted.approver,
        item.accepted.time,
        item.accepted.result,
        item.reviewed.approver,
        item.reviewed.time,
        item.reviewed.result,
        item.decision.approver,
        item.decision.time,
        item.decision.result,
        item.inspection.approver,
        item.inspection.time,
        item.inspection.result,
        item.evaluationResult,
        item.rectifications.map((rectify, rectifyIndex) => `第${rectifyIndex + 1}次 ${rectify.time} ${rectify.result} ${rectify.note}`).join("；"),
        item.status
      ]);

      const csvContent = [header, ...body]
        .map((row) => row.map((cell) => escapeCsv(cell)).join(","))
        .join("\r\n");

      const blob = new Blob([`\uFEFF${csvContent}`], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const url = URL.createObjectURL(blob);
      const today = new Date().toISOString().slice(0, 10);
      link.href = url;
      link.download = `安全证办事明细-${today}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

    function renderPage() {
      renderTable(filterRecords());
    }

    function initCompanyAutocomplete() {
      elements.companyName.addEventListener("focus", () => {
        renderCompanySuggestions(elements.companyName.value);
      });

      elements.companyName.addEventListener("input", () => {
        renderCompanySuggestions(elements.companyName.value);
      });

      elements.companyName.addEventListener("blur", () => {
        window.setTimeout(() => {
          closeCompanySuggestions();
        }, 120);
      });

      elements.companySuggestion.addEventListener("click", (event) => {
        const target = event.target.closest("[data-value]");
        if (!target) return;
        elements.companyName.value = target.dataset.value;
        closeCompanySuggestions();
      });
    }

    function initMatterAutocomplete() {
      elements.matterName.addEventListener("focus", () => {
        renderMatterSuggestions(elements.matterName.value);
      });

      elements.matterName.addEventListener("input", () => {
        renderMatterSuggestions(elements.matterName.value);
      });

      elements.matterName.addEventListener("blur", () => {
        window.setTimeout(() => {
          closeMatterSuggestions();
        }, 120);
      });

      elements.matterSuggestion.addEventListener("click", (event) => {
        const target = event.target.closest("[data-value]");
        if (!target) return;
        elements.matterName.value = target.dataset.value;
        closeMatterSuggestions();
      });
    }

    function init() {
      fillOptions(elements.statusName, [...new Set(detailRecords.map((item) => item.status))]);
      initCompanyAutocomplete();
      initMatterAutocomplete();

      elements.detailFilterForm.addEventListener("submit", (event) => {
        event.preventDefault();
        currentPage = 1;
        renderPage();
      });

      elements.resetBtn.addEventListener("click", () => {
        elements.detailFilterForm.reset();
        currentPage = 1;
        renderPage();
      });

      elements.exportBtn.addEventListener("click", () => {
        exportResults();
      });

      elements.prevPageBtn.addEventListener("click", () => {
        if (currentPage <= 1) return;
        currentPage -= 1;
        renderTable(currentFilteredRecords);
      });

      elements.nextPageBtn.addEventListener("click", () => {
        const totalPages = Math.max(1, Math.ceil(currentFilteredRecords.length / pageSize));
        if (currentPage >= totalPages) return;
        currentPage += 1;
        renderTable(currentFilteredRecords);
      });

      renderPage();
    }

    init();
  </script>
