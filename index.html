<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis Workspace</title>
  <style>
    :root {
      --bg: #eef3f7;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --line: rgba(25, 58, 87, 0.1);
      --line-strong: rgba(25, 58, 87, 0.18);
      --text: #1b3147;
      --muted: #667a8f;
      --primary: #1685b8;
      --primary-strong: #21a4dd;
      --teal: #1e9b82;
      --amber: #f19a34;
      --danger: #df6a49;
      --shadow: 0 22px 54px rgba(15, 35, 55, 0.1);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at 0% 0%, rgba(22, 133, 184, 0.16), transparent 24%),
        radial-gradient(circle at 100% 16%, rgba(241, 154, 52, 0.12), transparent 20%),
        linear-gradient(180deg, #f7fafc 0%, #edf2f6 44%, #e7edf3 100%);
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(12, 35, 58, 0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(12, 35, 58, 0.03) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.5), transparent 92%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .page-shell {
      width: min(1500px, calc(100vw - 28px));
      margin: 14px auto;
      padding: 14px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.82), rgba(246, 249, 252, 0.94)),
        rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(255, 255, 255, 0.76);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }

    .page-shell::after {
      content: "";
      position: absolute;
      inset: -90px auto auto -80px;
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22, 133, 184, 0.16), transparent 72%);
      pointer-events: none;
    }

    .hero {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .hero-main,
    .hero-side,
    .section-panel,
    .panel-card,
    .metric-card {
      background: var(--panel);
      border: 1px solid var(--line);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(10px);
    }

    .hero-main,
    .hero-side,
    .section-panel {
      border-radius: var(--radius-xl);
      padding: 14px;
    }

    .hero-main {
      background:
        linear-gradient(135deg, rgba(14, 50, 78, 0.98), rgba(10, 113, 151, 0.92) 56%, rgba(18, 148, 126, 0.84));
      color: #eef8ff;
      position: relative;
      overflow: hidden;
    }

    .hero-main::after {
      content: "";
      position: absolute;
      inset: auto -80px -90px auto;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.18), transparent 70%);
    }

    .hero-tag {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.12);
      color: #e2f7ff;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .hero-tag:empty,
    .section-tag:empty,
    .hero-main p:empty,
    .hero-chips:empty {
      display: none;
    }

    .hero-main h1 {
      margin: 8px 0 4px;
      font-size: clamp(1.42rem, 2.6vw, 2.2rem);
      line-height: 1.08;
      letter-spacing: 0.02em;
    }

    .hero-main p {
      margin: 0;
      max-width: 980px;
      color: rgba(232, 245, 255, 0.84);
      font-size: 0.84rem;
      line-height: 1.56;
    }

    .hero-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .hero-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.16);
      color: #f4fbff;
      font-size: 0.74rem;
    }

    .hero-side {
      display: grid;
      gap: 8px;
      align-content: start;
    }

    .hero-side h2,
    .section-head h2,
    .panel-card h3 {
      margin: 0;
      letter-spacing: 0.02em;
    }

    .section-head h2 {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      gap: 10px;
    }

    .section-inline-desc {
      color: var(--muted);
      font-size: 0.8rem;
      font-weight: 500;
      line-height: 1.5;
    }

    .hero-side p,
    .section-head p,
    .panel-card p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.56;
    }

    .section-tag {
      color: var(--primary);
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .status-list {
      display: grid;
      gap: 6px;
    }

    .status-item {
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(22, 133, 184, 0.06);
      border: 1px solid rgba(22, 133, 184, 0.08);
    }

    .status-item strong {
      display: block;
      font-size: 0.84rem;
      margin-bottom: 2px;
    }

    .status-item span {
      color: var(--muted);
      font-size: 0.74rem;
    }

    .section-panel {
      position: relative;
      z-index: 1;
      margin-bottom: 10px;
      padding: 14px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 12px;
      margin-bottom: 10px;
    }

    .filter-grid {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }

    .filter-grid-issue {
      grid-template-columns: repeat(5, minmax(0, 1fr));
    }

    .filter-grid-directory {
      grid-template-columns: repeat(12, minmax(0, 1fr));
    }

    .field {
      display: grid;
      gap: 4px;
      min-width: 0;
    }

    .field label {
      color: #61778d;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .field-compact {
      padding: 0;
      border: 0;
      background: transparent;
    }

    .field input,
    .field select {
      width: 100%;
      min-height: 40px;
      padding: 0 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(22, 133, 184, 0.48);
      box-shadow: 0 0 0 3px rgba(22, 133, 184, 0.12);
    }

    .multi-select-wrap {
      position: relative;
      min-width: 0;
    }

    .multi-select-trigger {
      width: 100%;
      min-height: 40px;
      padding: 0 34px 0 12px;
      color: var(--text);
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid var(--line);
      border-radius: 14px;
      text-align: left;
      position: relative;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .multi-select-trigger::after {
      content: "";
      position: absolute;
      right: 14px;
      top: 50%;
      width: 7px;
      height: 7px;
      border-right: 2px solid #536a81;
      border-bottom: 2px solid #536a81;
      transform: translateY(-60%) rotate(45deg);
      pointer-events: none;
    }

    .multi-select-panel {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      z-index: 20;
      display: none;
      min-width: max-content;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.98);
      border: 1px solid rgba(25, 58, 87, 0.12);
      box-shadow: 0 18px 36px rgba(15, 35, 55, 0.12);
    }

    .multi-select-panel.is-open {
      display: grid;
      gap: 8px;
    }

    .multi-select-option {
      display: grid;
      grid-template-columns: 14px 1fr;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      min-width: 0;
      padding: 0 8px;
      border-radius: 12px;
      background: rgba(244, 248, 251, 0.88);
      color: var(--text);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }

    .multi-select-option input {
      width: 14px;
      height: 14px;
      margin: 0;
      accent-color: #1685b8;
    }

    .multi-select-option span {
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .field-actions {
      display: flex;
      align-items: end;
      justify-content: flex-start;
      flex-wrap: nowrap;
      gap: 8px;
      white-space: nowrap;
      padding: 0;
      border: 0;
      background: transparent;
      min-width: 0;
    }

    .field-actions .btn-primary,
    .field-actions .btn-secondary {
      min-width: 92px;
      flex: 0 0 auto;
    }

    .btn-primary,
    .btn-secondary {
      min-width: 100px;
      min-height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .btn-primary {
      color: #fff;
      background: linear-gradient(135deg, #1da2dd, #147ca7);
      box-shadow: 0 12px 20px rgba(22, 133, 184, 0.18);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255, 255, 255, 0.84);
      border: 1px solid var(--line-strong);
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }

    .metric-card {
      border-radius: 20px;
      padding: 12px;
      position: relative;
      overflow: hidden;
    }

    .metric-card::after {
      content: "";
      position: absolute;
      inset: auto -30px -30px auto;
      width: 96px;
      height: 96px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(22, 133, 184, 0.14), transparent 72%);
    }

    .metric-card span {
      display: block;
      color: var(--muted);
      font-size: 0.76rem;
      margin-bottom: 8px;
    }

    .metric-card strong {
      display: block;
      font-size: clamp(1.3rem, 2vw, 1.82rem);
      line-height: 1;
      margin-bottom: 4px;
      position: relative;
      z-index: 1;
    }

    .metric-card em {
      position: relative;
      z-index: 1;
      color: var(--primary);
      font-style: normal;
      font-size: 0.72rem;
      font-weight: 700;
    }

    .two-column {
      display: grid;
      grid-template-columns: minmax(0, 1.38fr) minmax(300px, 0.86fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .panel-card {
      border-radius: var(--radius-lg);
      padding: 12px;
      background: rgba(255, 255, 255, 0.72);
    }

    .panel-card-head {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 10px;
      margin-bottom: 8px;
    }

    .panel-note {
      color: var(--muted);
      font-size: 0.78rem;
      text-align: right;
      white-space: nowrap;
    }

    .matter-list,
    .district-list,
    .legend-list {
      display: grid;
      gap: 8px;
    }

    .matter-card,
    .legend-item,
    .district-item {
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(248, 251, 253, 0.94);
      border: 1px solid rgba(22, 133, 184, 0.08);
    }

    .matter-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
    }

    .matter-top strong,
    .district-item strong {
      font-size: 0.94rem;
    }

    .matter-total {
      color: var(--primary);
      font-size: 0.88rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .stack-track {
      display: flex;
      height: 12px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(15, 43, 70, 0.08);
      margin-bottom: 10px;
    }

    .stack-segment {
      height: 100%;
    }

    .segment-accept {
      background: linear-gradient(90deg, #18a2db, #33b6ea);
    }

    .segment-review {
      background: linear-gradient(90deg, #1e9b82, #2db79a);
    }

    .segment-decision {
      background: linear-gradient(90deg, #f19a34, #f6b04f);
    }

    .segment-bureau {
      background: linear-gradient(90deg, #df6a49, #ef8564);
    }

    .stage-inline {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stage-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 0.78rem;
      background: rgba(15, 36, 56, 0.05);
    }

    .legend-item,
    .district-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .legend-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex: none;
    }

    .legend-copy span,
    .district-item span {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
    }

    .legend-value,
    .district-item em {
      color: var(--text);
      font-size: 1rem;
      font-style: normal;
      font-weight: 800;
      white-space: nowrap;
    }

    .district-item em {
      color: var(--primary);
    }

    .table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(25, 58, 87, 0.08);
      background: rgba(255, 255, 255, 0.72);
    }

    .table-pagination {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .page-indicator {
      color: var(--muted);
      font-size: 0.8rem;
      white-space: nowrap;
    }

    .page-btn {
      min-width: 88px;
      min-height: 36px;
      padding: 0 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      color: var(--text);
      font-weight: 700;
      white-space: nowrap;
    }

    .page-btn:disabled {
      cursor: default;
      opacity: 0.45;
    }

    table {
      width: 100%;
      min-width: 1360px;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 14px 12px;
      text-align: left;
      font-size: 0.82rem;
      color: #34536d;
      background: rgba(238, 245, 249, 0.98);
      border-bottom: 1px solid rgba(25, 58, 87, 0.12);
      white-space: nowrap;
    }

    tbody td {
      padding: 14px 12px;
      font-size: 0.84rem;
      color: var(--text);
      border-bottom: 1px solid rgba(25, 58, 87, 0.07);
      vertical-align: middle;
    }

    tbody tr:hover {
      background: rgba(22, 133, 184, 0.04);
    }

    .group-cell {
      background: rgba(244, 249, 252, 0.76);
      vertical-align: middle;
    }

    .group-cell-center {
      text-align: center;
    }

    .enterprise-group {
      display: grid;
      gap: 2px;
      justify-content: center;
      justify-items: center;
      text-align: center;
    }

    #enterpriseHeadName,
    .enterprise-name-cell {
      text-align: center;
    }

    .enterprise-note-list {
      display: grid;
      gap: 6px;
      margin-top: 6px;
    }

    .enterprise-group strong {
      font-size: 0.9rem;
      line-height: 1.4;
    }

    .enterprise-group span,
    .certificate-meta,
    .qualification-meta {
      color: var(--muted);
      font-size: 0.76rem;
      line-height: 1.5;
    }

    .certificate-stack,
    .qualification-stack {
      display: grid;
      gap: 2px;
    }

    .certificate-stack {
      justify-content: center;
      justify-items: center;
      text-align: center;
    }

    #enterpriseHeadCertificateNo,
    .certificate-cell {
      text-align: center;
    }

    .validity-stack {
      display: grid;
      gap: 4px;
    }

    .validity-stack strong {
      font-size: 0.82rem;
      line-height: 1.45;
    }

    .validity-stack strong.is-expired-date {
      color: var(--danger);
    }

    .validity-note {
      color: var(--muted);
      font-size: 0.74rem;
      line-height: 1.5;
    }

    .legal-person-chip {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 12px;
      background: rgba(22, 133, 184, 0.08);
      color: #21506f;
      font-size: 0.78rem;
      font-weight: 600;
      line-height: 1.4;
    }

    .legal-person-mismatch {
      background: rgba(223, 106, 73, 0.16);
      color: #9d3f2c;
      box-shadow: inset 0 0 0 1px rgba(223, 106, 73, 0.16);
    }

    .certificate-risk-note {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(223, 106, 73, 0.12);
      color: #9d3f2c;
      font-size: 0.72rem;
      font-weight: 700;
      line-height: 1.4;
    }

    .cell-tag {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(22, 133, 184, 0.1);
      color: var(--primary);
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .qualification-stack strong,
    .certificate-stack strong {
      font-size: 0.84rem;
      line-height: 1.45;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 78px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .status-valid {
      color: #0f6e60;
      background: rgba(30, 155, 130, 0.12);
    }

    .status-soon {
      color: #9a5a00;
      background: rgba(241, 154, 52, 0.16);
    }

    .status-expired {
      color: #a23d2b;
      background: rgba(223, 106, 73, 0.16);
    }

    .directory-layout {
      display: block;
      margin-bottom: 10px;
    }

    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .footer-note {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1.7;
      text-align: right;
    }

    .fade-up {
      animation: fadeUp 420ms ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1280px) {
      .hero,
      .two-column {
        grid-template-columns: 1fr;
      }

      .filter-grid-issue {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .filter-grid-directory {
        grid-template-columns: repeat(6, minmax(0, 1fr));
      }

      .metric-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 920px) {
      .page-shell {
        width: calc(100vw - 16px);
        margin: 8px auto;
        padding: 12px;
        border-radius: 22px;
      }

      .hero-main,
      .hero-side,
      .section-panel,
      .panel-card,
      .metric-card {
        padding: 12px;
      }

      .filter-grid-issue,
      .filter-grid-directory,
      .metric-grid {
        grid-template-columns: 1fr;
      }

      .field-actions {
        display: flex;
        flex-wrap: wrap;
      }

      .btn-primary,
      .btn-secondary {
        width: 100%;
      }

      table {
        min-width: 760px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="hero fade-up">
      <section class="hero-main">
        <span class="hero-tag" id="heroTag"></span>
        <h1 id="heroTitle"></h1>
        <p id="heroDesc"></p>
        <div class="hero-chips" id="heroChips"></div>
      </section>
    </header>

    <section class="section-panel fade-up">
      <form id="enterpriseFilterForm">
        <div class="filter-grid filter-grid-directory">
          <div class="field field-compact" style="grid-column: span 3;">
            <label for="enterpriseName" id="labelEnterpriseName"></label>
            <input id="enterpriseName" name="enterpriseName" type="text">
          </div>

      const options = values.map((value) => `<option value="${value}">${value}</option>`).join("");
      select.insertAdjacentHTML("beforeend", options);
    }

    function fillCertificateTypeOptions(values) {
      elements.certificateTypePanel.innerHTML = values.map((value) => `
        <label class="multi-select-option">
          <input type="checkbox" name="certificateType" value="${value}">
          <span>${value}</span>
        </label>
      `).join("");
      updateCertificateTypeTriggerText();
    }

    function getSelectedCertificateTypes() {
      return Array.from(elements.certificateTypePanel.querySelectorAll('input[name="certificateType"]:checked')).map((input) => input.value);
    }

    function updateCertificateTypeTriggerText() {
      const selected = getSelectedCertificateTypes();
      if (!selected.length) {
        elements.certificateTypeTrigger.textContent = textMap.certificateTypePlaceholder;
        elements.certificateTypeTrigger.title = textMap.certificateTypePlaceholder;
        return;
      }

      const triggerText = selected.length <= 2 ? selected.join("、") : `\u5df2\u9009 ${selected.length} \u9879`;
      elements.certificateTypeTrigger.textContent = triggerText;
      elements.certificateTypeTrigger.title = selected.join("、");
    }

    function toDate(value) {
      return value ? new Date(`${value}T00:00:00`) : null;
    }

    function formatNumber(value) {
      return value.toLocaleString("zh-CN");
    }

    function buildEmptyRow(colspan, text) {
      return `<tr><td colspan="${colspan}"><div class="empty-state">${text}</div></td></tr>`;
    }

    function updateEnterprisePagination(totalEnterprises) {
      const totalPages = Math.max(1, Math.ceil(totalEnterprises / paginationState.enterprisePageSize));
      if (paginationState.enterprisePage > totalPages) {
        paginationState.enterprisePage = totalPages;
      }

      elements.enterprisePageIndicator.textContent = textMap.enterprisePageText
        .replace("{current}", `${paginationState.enterprisePage}`)
        .replace("{total}", `${totalPages}`)
        .replace("{count}", `${totalEnterprises}`);
      elements.enterprisePrevBtn.textContent = textMap.enterprisePrevBtn;
      elements.enterpriseNextBtn.textContent = textMap.enterpriseNextBtn;
      elements.enterprisePrevBtn.disabled = paginationState.enterprisePage <= 1;
      elements.enterpriseNextBtn.disabled = paginationState.enterprisePage >= totalPages;
    }

    function getIssueFilters() {
      const formData = new FormData(elements.issueFilterForm);
      return {
        startDate: formData.get("issueStartDate"),
        endDate: formData.get("issueEndDate"),
        matter: formData.get("issueMatter"),
        region: formData.get("issueRegion")
      };
    }

    function filterIssueRecords() {
      const filters = getIssueFilters();
      const startDate = toDate(filters.startDate);
      const endDate = toDate(filters.endDate);

      return issueRecords.filter((record) => {
        const currentDate = toDate(record.finishedDate);
        if (startDate && currentDate < startDate) return false;
        if (endDate && currentDate > endDate) return false;
        if (filters.matter && record.matter !== filters.matter) return false;
        if (filters.region && record.region !== filters.region) return false;
        return true;
      });
    }

    function aggregateIssueRecords(records) {
      const map = new Map();

      records.forEach((record) => {
        if (!map.has(record.matter)) {
          map.set(record.matter, {
            matter: record.matter,
            recordCount: 0,
            accepted: 0,
            reviewed: 0,
            decided: 0,
            bureau: 0,
            latestDate: record.finishedDate
          });
        }

        const bucket = map.get(record.matter);
        bucket.recordCount += 1;
        bucket.accepted += record.accepted;
        bucket.reviewed += record.reviewed;
        bucket.decided += record.decided;
        bucket.bureau += record.bureau;
        bucket.latestDate = bucket.latestDate > record.finishedDate ? bucket.latestDate : record.finishedDate;
      });

      return [...map.values()].sort((a, b) => (b.accepted + b.reviewed + b.decided + b.bureau) - (a.accepted + a.reviewed + a.decided + a.bureau));
    }

    function renderIssueMatterList(aggregated) {
      if (!aggregated.length) {
        elements.issueMatterList.innerHTML = `<div class="empty-state">${textMap.noIssueData}</div>`;
        return;
      }

      elements.issueMatterList.innerHTML = aggregated.map((item) => {
        const total = item.accepted + item.reviewed + item.decided + item.bureau;
        const segments = issueStageMeta.map((stage) => {
          const width = total ? (item[stage.key] / total) * 100 : 0;
          return `<span class="stack-segment ${stage.className}" style="width:${width}%"></span>`;
        }).join("");

        const pills = issueStageMeta.map((stage) => `
          <span class="stage-pill">${stage.label} ${formatNumber(item[stage.key])}</span>
        `).join("");

        return `
          <article class="matter-card">
            <div class="matter-top">
              <strong>${item.matter}</strong>
              <span class="matter-total">${textMap.stageTotalPrefix} ${formatNumber(total)}</span>
            </div>
            <div class="stack-track">${segments}</div>
            <div class="stage-inline">${pills}</div>
          </article>
        `;
      }).join("");
    }

    function renderIssueLegend(aggregated) {
      const totals = aggregated.reduce((accumulator, item) => {
        issueStageMeta.forEach((stage) => {
          accumulator[stage.key] += item[stage.key];
        });
        return accumulator;
      }, { accepted: 0, reviewed: 0, decided: 0, bureau: 0 });

      elements.issueLegendList.innerHTML = issueStageMeta.map((stage) => `
        <article class="legend-item">
          <div class="legend-left">
            <span class="legend-dot ${stage.className}"></span>
            <div class="legend-copy">
              <strong>${stage.label}</strong>
              <span>${stage.note}</span>
            </div>
          </div>
          <div class="legend-value">${formatNumber(totals[stage.key])}</div>
        </article>
      `).join("");
    }

    function renderIssueTable(aggregated) {
      if (!aggregated.length) {
        elements.issueTableBody.innerHTML = buildEmptyRow(8, textMap.noIssueTableData);
        return;
      }

      elements.issueTableBody.innerHTML = aggregated.map((item) => {
        const total = item.accepted + item.reviewed + item.decided + item.bureau;
        return `
          <tr>
            <td>${item.matter}</td>
            <td>${formatNumber(item.recordCount)}</td>
            <td>${formatNumber(item.accepted)}</td>
            <td>${formatNumber(item.reviewed)}</td>
            <td>${formatNumber(item.decided)}</td>
            <td>${formatNumber(item.bureau)}</td>
            <td>${formatNumber(total)}</td>
            <td>${item.latestDate}</td>
          </tr>
        `;
      }).join("");
    }

    function renderIssueRangeNote(records) {
      if (!records.length) {
        elements.issueRangeNote.textContent = textMap.rangeEmpty;
        return;
      }

      const sortedDates = records.map((item) => item.finishedDate).sort();
      elements.issueRangeNote.textContent = `${sortedDates[0]} \u81f3 ${sortedDates[sortedDates.length - 1]}`;
    }

    function renderIssueSection() {
      const filtered = filterIssueRecords();
      const aggregated = aggregateIssueRecords(filtered);
      renderIssueMatterList(aggregated);
      renderIssueLegend(aggregated);
      renderIssueTable(aggregated);
      renderIssueRangeNote(filtered);
    }

    function getEnterpriseFilters() {
      const formData = new FormData(elements.enterpriseFilterForm);
      return {
        enterpriseName: (formData.get("enterpriseName") || "").trim().toLowerCase(),
        district: formData.get("district"),
        qualificationType: formData.get("qualificationType"),
        qualificationGrade: formData.get("qualificationGrade"),
        certificateTypes: getSelectedCertificateTypes(),
        certificateNo: (formData.get("certificateNo") || "").trim().toLowerCase(),
        validFrom: formData.get("validFrom"),
        validTo: formData.get("validTo"),
        validityStatus: formData.get("validityStatus")
      };
    }

    function flattenEnterpriseDirectory() {
      return enterpriseDirectory.flatMap((enterprise) =>
        enterprise.certificates.flatMap((certificate) =>
          certificate.qualifications.map((qualification) => ({
            name: enterprise.name,
            businessStatus: enterprise.businessStatus,
            district: enterprise.district,
            legalPerson: enterprise.legalPerson,
            certificateLegalPerson: certificate.certificateLegalPerson || enterprise.legalPerson,
            certificateType: certificate.certificateType,
            certificateName: certificate.certificateName,
            certificateNo: certificate.certificateNo,
            validityMode: certificate.validityMode,
            certificateValidTo: certificate.certificateValidTo || "",
            qualificationType: qualification.qualificationType,
            qualificationName: qualification.qualificationName,
            qualificationGrade: qualification.qualificationGrade,
            qualificationValidTo: qualification.qualificationValidTo || "",
            effectiveValidTo: certificate.validityMode === "certificate" ? (certificate.certificateValidTo || "") : (qualification.qualificationValidTo || ""),
            validityStatus: qualification.validityStatus || certificate.validityStatus || ""
          }))
        )
      );
    }

    function filterEnterpriseDirectory() {
      const filters = getEnterpriseFilters();
      const validFrom = toDate(filters.validFrom);
      const validTo = toDate(filters.validTo);
      const flattened = flattenEnterpriseDirectory();

      return flattened.filter((item) => {
        const currentValidTo = toDate(item.effectiveValidTo);
        if (filters.enterpriseName && !item.name.toLowerCase().includes(filters.enterpriseName)) return false;
        if (filters.district && item.district !== filters.district) return false;
        if (filters.qualificationType && item.qualificationType !== filters.qualificationType) return false;
        if (filters.qualificationGrade && item.qualificationGrade !== filters.qualificationGrade) return false;
        if (filters.certificateTypes.length && !filters.certificateTypes.includes(item.certificateType)) return false;
        if (filters.certificateNo && !item.certificateNo.toLowerCase().includes(filters.certificateNo)) return false;
        if (filters.validityStatus && item.validityStatus !== filters.validityStatus) return false;
        if (validFrom && currentValidTo < validFrom) return false;
        if (validTo && currentValidTo > validTo) return false;
        return true;
      });
    }

    function renderEnterpriseTable(records) {
      if (!records.length) {
        elements.enterpriseTableBody.innerHTML = buildEmptyRow(10, textMap.noEnterpriseData);
        updateEnterprisePagination(0);
        return;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);

      const getStatusClass = (status) => {
        if (status === "\u5373\u5c06\u5230\u671f") return "status-badge status-soon";
        if (status === "\u5df2\u8fc7\u671f") return "status-badge status-expired";
        return "status-badge status-valid";
      };

      const grouped = [];

      records.forEach((item) => {
        let enterpriseGroup = grouped.find((group) => group.name === item.name);
        if (!enterpriseGroup) {
          enterpriseGroup = {
            name: item.name,
            businessStatus: item.businessStatus,
            district: item.district,
            legalPerson: item.legalPerson,
            certificates: []
          };
          grouped.push(enterpriseGroup);
        }

        let certificateGroup = enterpriseGroup.certificates.find((certificate) => certificate.certificateNo === item.certificateNo);
        if (!certificateGroup) {
          certificateGroup = {
            certificateType: item.certificateType,
            certificateName: item.certificateName,
            certificateNo: item.certificateNo,
            certificateLegalPerson: item.certificateLegalPerson,
            validityMode: item.validityMode,
            certificateValidTo: item.certificateValidTo,
            qualifications: []
          };
          enterpriseGroup.certificates.push(certificateGroup);
        }

        certificateGroup.qualifications.push({
          qualificationName: item.qualificationName,
          qualificationType: item.qualificationType,
          qualificationGrade: item.qualificationGrade,
          qualificationValidTo: item.qualificationValidTo,
          effectiveValidTo: item.effectiveValidTo,
          certificateLegalPerson: item.certificateLegalPerson,
          validityStatus: item.validityStatus
        });
      });

      const totalEnterprises = grouped.length;
      const totalPages = Math.max(1, Math.ceil(totalEnterprises / paginationState.enterprisePageSize));
      if (paginationState.enterprisePage > totalPages) {
        paginationState.enterprisePage = totalPages;
      }
      const startIndex = (paginationState.enterprisePage - 1) * paginationState.enterprisePageSize;
      const pagedGroups = grouped.slice(startIndex, startIndex + paginationState.enterprisePageSize);
      const rows = [];

      pagedGroups.forEach((enterpriseGroup, pageIndex) => {
        const enterpriseIndex = startIndex + pageIndex;
        const enterpriseRowspan = enterpriseGroup.certificates.reduce((sum, certificate) => sum + certificate.qualifications.length, 0);
        let enterprisePrinted = false;
        const hasSafetyCertificate = enterpriseGroup.certificates.some((certificate) => certificate.certificateType === "\u5b89\u5168\u8bc1\u8bc1\u4e66");
        const hasConstructionCertificate = enterpriseGroup.certificates.some((certificate) => certificate.certificateType === "\u5efa\u7b51\u4e1a\u8bc1\u4e66");
        const safetyBlocked = hasSafetyCertificate && !hasConstructionCertificate;
        const hasLegalPersonMismatch = enterpriseGroup.certificates.some((certificate) => certificate.certificateLegalPerson !== enterpriseGroup.legalPerson);

        enterpriseGroup.certificates.forEach((certificateGroup) => {
          const certificateRowspan = certificateGroup.qualifications.length;
          let certificatePrinted = false;
          const legalPersonMismatch = certificateGroup.certificateLegalPerson !== enterpriseGroup.legalPerson;

          certificateGroup.qualifications.forEach((qualification) => {
            const cells = [];
            const effectiveValidToDate = toDate(qualification.effectiveValidTo);
            const isExpiredDate = effectiveValidToDate && effectiveValidToDate < today;
            const validityDateClass = isExpiredDate ? "is-expired-date" : "";

            if (!enterprisePrinted) {
              cells.push(`
                <td class="group-cell" rowspan="${enterpriseRowspan}">${enterpriseIndex + 1}</td>
                <td class="group-cell enterprise-name-cell" rowspan="${enterpriseRowspan}">
                  <div class="enterprise-group">
                    <strong>${enterpriseGroup.name}</strong>
                    ${(hasLegalPersonMismatch || safetyBlocked) ? `
                      <div class="enterprise-note-list">
                        ${hasLegalPersonMismatch ? `<span class="certificate-risk-note">\u8bc1\u4e66\u6cd5\u4eba\u4e0d\u4e00\u81f4\u3002</span>` : ""}
                        ${safetyBlocked ? `<span class="certificate-risk-note">\u4ec5\u6709\u5b89\u5168\u8bc1\uff0c\u65e0\u5efa\u7b51\u4e1a\u8bc1\u4e66\u3002</span>` : ""}
                      </div>
                    ` : ""}
                  </div>
                </td>
                <td class="group-cell group-cell-center" rowspan="${enterpriseRowspan}">${enterpriseGroup.businessStatus || "\u2014"}</td>
                <td class="group-cell" rowspan="${enterpriseRowspan}">${enterpriseGroup.legalPerson || "\u2014"}</td>
                <td class="group-cell group-cell-center" rowspan="${enterpriseRowspan}">${enterpriseGroup.district}</td>
              `);
              enterprisePrinted = true;
            }

            if (!certificatePrinted) {
              cells.push(`
                <td class="group-cell certificate-cell" rowspan="${certificateRowspan}">
                  <div class="certificate-stack">
                    <strong>${certificateGroup.certificateNo}</strong>
                  </div>
                </td>
              `);
              certificatePrinted = true;
            }

            cells.push(`
              <td>
                <div class="qualification-stack">
                  <strong>${qualification.qualificationName}${qualification.qualificationGrade}</strong>
                </div>
              </td>
              <td>
                <div class="validity-stack">
                  <strong class="${validityDateClass}">${qualification.effectiveValidTo || "\u2014"}</strong>
                </div>
              </td>
              <td>
                <span class="legal-person-chip${legalPersonMismatch ? " legal-person-mismatch" : ""}">${certificateGroup.certificateLegalPerson}</span>
              </td>
              <td><span class="${getStatusClass(qualification.validityStatus)}">${qualification.validityStatus}</span></td>
            `);

            rows.push(`<tr>${cells.join("")}</tr>`);
          });
        });
      });

      elements.enterpriseTableBody.innerHTML = rows.join("");
      updateEnterprisePagination(totalEnterprises);
    }

    function buildEnterpriseExportRows(records) {
      const enterpriseIndexMap = new Map();
      let currentIndex = 0;

      return records.map((item) => {
        if (!enterpriseIndexMap.has(item.name)) {
          currentIndex += 1;
          enterpriseIndexMap.set(item.name, currentIndex);
        }

        return [
          enterpriseIndexMap.get(item.name),
          item.name,
          item.businessStatus || "",
          item.legalPerson || "",
          item.district,
          item.certificateNo,
          item.qualificationType,
          `${item.qualificationName}${item.qualificationGrade}`,
          item.effectiveValidTo || "",
          item.certificateLegalPerson,
          item.validityStatus
        ];
      });
    }

    function exportEnterpriseRecords() {
      const records = filterEnterpriseDirectory();
      if (!records.length) return;

      const headers = [
        textMap.enterpriseHeadIndex,
        textMap.enterpriseHeadName,
        textMap.enterpriseHeadBusinessStatus,
        textMap.enterpriseHeadBusinessLegalPerson,
        textMap.enterpriseHeadDistrict,
        textMap.enterpriseHeadCertificateNo,
        textMap.labelQualificationType,
        textMap.enterpriseHeadQualificationSeries,
        textMap.enterpriseHeadValidityDate,
        textMap.enterpriseHeadLegalPerson,
        textMap.enterpriseHeadStatus
      ];

      const rows = buildEnterpriseExportRows(records);
      const csv = [headers, ...rows].map((row) =>
        row.map((value) => {
          const normalized = `${value ?? ""}`.replace(/"/g, '""');
          return `"${normalized}"`;
        }).join(",")
      ).join("\r\n");

      const blob = new Blob(["\uFEFF", csv], { type: "text/csv;charset=utf-8;" });
      const link = document.createElement("a");
      const date = new Date();
      const pad = (value) => `${value}`.padStart(2, "0");
      const fileName = `${textMap.exportFilePrefix}_${date.getFullYear()}${pad(date.getMonth() + 1)}${pad(date.getDate())}_${pad(date.getHours())}${pad(date.getMinutes())}${pad(date.getSeconds())}.csv`;

      link.href = URL.createObjectURL(blob);
      link.download = fileName;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(link.href);
    }

    function renderEnterpriseSection() {
      const filtered = filterEnterpriseDirectory();
      renderEnterpriseTable(filtered);
    }

    function initializeFilters() {
      const flattened = flattenEnterpriseDirectory();
      fillOptions(elements.district, [...new Set(flattened.map((item) => item.district))]);
      fillOptions(elements.qualificationType, [...new Set(flattened.map((item) => item.qualificationType))]);
      fillOptions(elements.qualificationGrade, [...new Set(flattened.map((item) => item.qualificationGrade))]);
      fillCertificateTypeOptions([...new Set(flattened.map((item) => item.certificateType))]);
    }

    elements.enterpriseFilterForm.addEventListener("submit", (event) => {
      event.preventDefault();
      paginationState.enterprisePage = 1;
      renderEnterpriseSection();
    });

    elements.enterpriseResetBtn.addEventListener("click", () => {
      elements.enterpriseFilterForm.reset();
      elements.certificateTypePanel.querySelectorAll('input[name="certificateType"]').forEach((input) => {
        input.checked = false;
      });
      elements.certificateTypePanel.classList.remove("is-open");
      updateCertificateTypeTriggerText();
      paginationState.enterprisePage = 1;
      renderEnterpriseSection();
    });

    elements.enterpriseExportBtn.addEventListener("click", () => {
      exportEnterpriseRecords();
    });

    elements.enterprisePrevBtn.addEventListener("click", () => {
      if (paginationState.enterprisePage <= 1) return;
      paginationState.enterprisePage -= 1;
      renderEnterpriseSection();
    });

    elements.enterpriseNextBtn.addEventListener("click", () => {
      paginationState.enterprisePage += 1;
      renderEnterpriseSection();
    });

    elements.certificateTypeTrigger.addEventListener("click", () => {
      elements.certificateTypePanel.classList.toggle("is-open");
    });

    elements.certificateTypePanel.addEventListener("change", (event) => {
      if (event.target instanceof HTMLInputElement) {
        updateCertificateTypeTriggerText();
      }
    });

    document.addEventListener("click", (event) => {
      const target = event.target;
      if (!(target instanceof Node)) return;
      const wrap = elements.certificateTypeTrigger.closest(".multi-select-wrap");
      if (wrap && !wrap.contains(target)) {
        elements.certificateTypePanel.classList.remove("is-open");
      }
    });

    fillTexts();
    initializeFilters();
    renderEnterpriseSection();
  </script>
</body>
</html>
