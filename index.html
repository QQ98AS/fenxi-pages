<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>建设行业大数据分析平台</title>
  <style>
    :root {
      --bg: #06111f;
      --bg-soft: #0b1d34;
      --panel: rgba(7, 28, 48, 0.82);
      --panel-strong: rgba(9, 38, 64, 0.96);
      --panel-light: rgba(15, 55, 89, 0.92);
      --line: rgba(108, 180, 255, 0.18);
      --line-strong: rgba(108, 180, 255, 0.34);
      --text: #e9f4ff;
      --muted: #8da9c4;
      --primary: #47b2ff;
      --primary-strong: #7fd6ff;
      --cyan: #3ed7c8;
      --gold: #ffce62;
      --danger: #ff7b8b;
      --shadow: 0 24px 60px rgba(0, 8, 18, 0.45);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      color: var(--text);
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei UI", sans-serif;
      background:
        radial-gradient(circle at 12% 12%, rgba(71, 178, 255, 0.2), transparent 28%),
        radial-gradient(circle at 86% 16%, rgba(62, 215, 200, 0.16), transparent 24%),
        radial-gradient(circle at 50% 100%, rgba(255, 206, 98, 0.1), transparent 24%),
        linear-gradient(180deg, #07111e 0%, #081627 32%, #06101c 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(127, 214, 255, 0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(127, 214, 255, 0.04) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.52), transparent 92%);
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: 0;
    }

    .page-shell {
      width: min(1560px, calc(100vw - 28px));
      margin: 14px auto;
      padding: 18px;
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(9, 28, 46, 0.92), rgba(5, 18, 32, 0.94)),
        rgba(6, 18, 32, 0.92);
      border: 1px solid rgba(115, 190, 255, 0.16);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      position: relative;
      overflow: hidden;
    }

    .page-shell::after {
      content: "";
      position: absolute;
      inset: auto -120px -120px auto;
      width: 340px;
      height: 340px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(71, 178, 255, 0.18), transparent 70%);
      filter: blur(12px);
      pointer-events: none;
    }

    .panel,
    .metric-card {
      border: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(12px);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04);
    }

    .module-tabs {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
      position: relative;
      z-index: 1;
    }

    .module-tab {
      padding: 14px 12px;
      border-radius: 18px;
      color: #b7cae2;
      background: linear-gradient(180deg, rgba(10, 34, 57, 0.9), rgba(5, 22, 39, 0.92));
      border: 1px solid rgba(108, 180, 255, 0.14);
      text-align: center;
      transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease, color 180ms ease;
    }

    .module-tab strong {
      display: block;
      font-size: 0.98rem;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .module-tab span {
      display: block;
      font-size: 0.75rem;
      color: #7e9ab7;
    }

    .module-tab:hover,
    .module-tab.active {
      transform: translateY(-2px);
      color: var(--text);
      border-color: rgba(127, 214, 255, 0.36);
      box-shadow: 0 16px 32px rgba(0, 10, 22, 0.28);
      background:
        linear-gradient(180deg, rgba(19, 74, 118, 0.98), rgba(8, 35, 57, 0.96));
    }

    .filter-panel {
      position: relative;
      z-index: 1;
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(7, 29, 50, 0.96), rgba(4, 19, 33, 0.94));
      box-shadow: var(--shadow);
    }

    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 14px;
      margin-bottom: 16px;
    }

    .panel-head h2,
    .panel-head h3 {
      margin: 8px 0 0;
      font-size: 1.08rem;
      letter-spacing: 0.03em;
    }

    .panel-head p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 0.84rem;
      line-height: 1.7;
    }

    .panel-tag {
      color: var(--primary-strong);
      font-size: 0.76rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(8, minmax(0, 1fr));
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .field span {
      color: var(--muted);
      font-size: 0.82rem;
    }

    .field input,
    .field select {
      width: 100%;
      height: 44px;
      padding: 0 14px;
      color: var(--text);
      background: rgba(4, 18, 33, 0.88);
      border: 1px solid rgba(108, 180, 255, 0.16);
      border-radius: 14px;
      outline: none;
      transition: border-color 160ms ease, box-shadow 160ms ease;
    }

    .field input:focus,
    .field select:focus {
      border-color: rgba(127, 214, 255, 0.46);
      box-shadow: 0 0 0 3px rgba(71, 178, 255, 0.12);
    }

    .filter-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 14px;
    }

    .btn-primary,
    .btn-secondary {
      min-width: 118px;
      height: 42px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .btn-primary {
      color: #051322;
      background: linear-gradient(135deg, #7fd6ff, #3ed7c8);
      box-shadow: 0 10px 22px rgba(62, 215, 200, 0.22);
    }

    .btn-secondary {
      color: #c5d8ed;
      background: rgba(6, 25, 43, 0.88);
      border: 1px solid rgba(108, 180, 255, 0.16);
    }

    .active-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
      min-height: 20px;
    }

    .filter-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(71, 178, 255, 0.12);
      border: 1px solid rgba(127, 214, 255, 0.16);
      color: #d8ecff;
      font-size: 0.82rem;
    }

    .summary-strip {
      position: relative;
      z-index: 1;
      margin: 16px 0;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .metric-card {
      border-radius: 20px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      transition: transform 180ms ease, border-color 180ms ease;
    }

    .metric-card::after {
      content: "";
      position: absolute;
      inset: auto -36px -36px auto;
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(127, 214, 255, 0.18), transparent 72%);
    }

    .metric-card:hover {
      transform: translateY(-3px);
      border-color: rgba(127, 214, 255, 0.26);
    }

    .metric-card span {
      display: block;
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 14px;
    }

    .metric-main {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 10px;
      position: relative;
      z-index: 1;
    }

    .metric-main strong {
      font-size: clamp(1.8rem, 3vw, 2.5rem);
      line-height: 1;
    }

    .metric-main em {
      font-style: normal;
      color: var(--cyan);
      font-size: 0.88rem;
      font-weight: 700;
    }

    .dashboard-grid {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.8fr) minmax(320px, 0.8fr);
      gap: 16px;
    }

    .panel {
      border-radius: var(--radius-lg);
      padding: 18px;
    }

    .dimension-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 18px;
    }

    .dimension-tab {
      padding: 10px 16px;
      border-radius: 999px;
      background: rgba(6, 22, 39, 0.86);
      color: #b6cade;
      border: 1px solid rgba(108, 180, 255, 0.14);
      transition: all 180ms ease;
    }

    .dimension-tab.active,
    .dimension-tab:hover {
      background: linear-gradient(135deg, rgba(66, 145, 209, 0.2), rgba(62, 215, 200, 0.16));
      border-color: rgba(127, 214, 255, 0.34);
      color: var(--text);
    }

    .chart-layout {
      display: grid;
      grid-template-columns: minmax(0, 1.3fr) minmax(280px, 0.9fr);
      gap: 14px;
      margin-bottom: 14px;
    }

    .chart-card,
    .sub-card {
      border-radius: 20px;
      padding: 16px;
      background: rgba(5, 21, 37, 0.74);
      border: 1px solid rgba(108, 180, 255, 0.14);
    }

    .chart-card h3,
    .sub-card h3 {
      margin: 0 0 6px;
      font-size: 1rem;
    }

    .chart-card p,
    .sub-card p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .line-chart svg {
      width: 100%;
      height: 230px;
      display: block;
    }

    .chart-note-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .bar-list {
      display: grid;
      gap: 12px;
    }

    .bar-item {
      display: grid;
      gap: 8px;
    }

    .bar-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #d7ebff;
      font-size: 0.86rem;
    }

    .bar-track {
      height: 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #2cc9ff, #3ed7c8, #ffce62);
      box-shadow: 0 0 18px rgba(71, 178, 255, 0.22);
    }

    .dimension-detail {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .detail-card {
      padding: 16px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(10, 39, 64, 0.8), rgba(4, 18, 32, 0.82));
      border: 1px solid rgba(108, 180, 255, 0.14);
    }

    .detail-card span {
      display: block;
      color: var(--muted);
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    .detail-card strong {
      display: block;
      font-size: 1.28rem;
      margin-bottom: 6px;
    }

    .detail-card p {
      margin: 0;
      color: #b3c9df;
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .data-table-wrap {
      overflow: auto;
      border-radius: 18px;
      border: 1px solid rgba(108, 180, 255, 0.14);
      background: rgba(4, 18, 32, 0.72);
    }

    table {
      width: 100%;
      min-width: 880px;
      border-collapse: collapse;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 1;
      padding: 14px 12px;
      text-align: left;
      font-size: 0.82rem;
      color: #d8ebff;
      background: rgba(12, 47, 76, 0.98);
      border-bottom: 1px solid rgba(127, 214, 255, 0.18);
      white-space: nowrap;
    }

    tbody td {
      padding: 14px 12px;
      font-size: 0.84rem;
      color: #bfd4ea;
      border-bottom: 1px solid rgba(108, 180, 255, 0.09);
      vertical-align: top;
    }

    tbody tr:hover {
      background: rgba(71, 178, 255, 0.06);
    }

    .side-stage {
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .insight-list,
    .ranking-list,
    .alert-list {
      display: grid;
      gap: 10px;
    }

    .insight-item,
    .ranking-item,
    .alert-item {
      padding: 14px;
      border-radius: 16px;
      background: rgba(5, 21, 37, 0.78);
      border: 1px solid rgba(108, 180, 255, 0.12);
    }

    .insight-item strong,
    .ranking-item strong,
    .alert-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 0.92rem;
    }

    .insight-item p,
    .ranking-item p,
    .alert-item p {
      margin: 0;
      color: var(--muted);
      font-size: 0.82rem;
      line-height: 1.7;
    }

    .ranking-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .ranking-index {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: #07111f;
      font-weight: 800;
      background: linear-gradient(135deg, #7fd6ff, #ffce62);
      flex: none;
    }

    .ranking-copy {
      flex: 1;
    }

    .ranking-value {
      color: var(--cyan);
      font-size: 0.92rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .alert-item {
      border-left: 4px solid var(--gold);
    }

    .footer-note {
      margin-top: 14px;
      color: #7897b6;
      font-size: 0.8rem;
      line-height: 1.7;
      text-align: right;
    }

    .fade-up {
      animation: fadeUp 420ms ease;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 1280px) {
      .filter-grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
      }

      .summary-strip,
      .dimension-detail {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .dashboard-grid,
      .chart-layout,
    }

    @media (max-width: 920px) {
      .page-shell {
        width: calc(100vw - 16px);
        margin: 8px auto;
        padding: 12px;
        border-radius: 20px;
      }

      .module-tabs,
      .hero-meta,
      .summary-strip,
      .dimension-detail,
      .filter-grid {
        grid-template-columns: 1fr;
      }

      .filter-actions {
        justify-content: stretch;
      }

      .btn-primary,
      .btn-secondary {
        flex: 1;
      }

      .panel,
      .filter-panel {
        padding: 14px;
      }

      .dimension-tabs {
        overflow: auto;
        flex-wrap: nowrap;
        padding-bottom: 4px;
      }

      .dimension-tab {
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <nav class="module-tabs fade-up" id="moduleTabs"></nav>

    <section class="filter-panel fade-up">
      <div class="panel-head">
        <div>
          <span class="panel-tag">Filter Query</span>
          <h2>查询条件重设计</h2>
          <p>延续原页面检索思路，增强为可服务多栏目分析的统一筛选区。</p>
        </div>
      </div>

      <form id="queryForm">
        <div class="filter-grid">
          <label class="field">
            <span>企业名称</span>
            <input type="text" name="enterpriseName" placeholder="请输入企业名称">
          </label>
          <label class="field">
            <span>组织机构代码</span>
            <input type="text" name="orgCode" placeholder="请输入组织机构代码">
          </label>
          <label class="field">
            <span>企业资质</span>
            <select name="qualification">
              <option value="">全部资质</option>
              <option>施工总承包</option>
              <option>工程监理</option>
              <option>质量检测</option>
              <option>安全生产许可</option>
            </select>
          </label>
          <label class="field">
            <span>证书等级</span>
            <select name="grade">
              <option value="">全部等级</option>
              <option>特级</option>
              <option>一级</option>
              <option>二级</option>
              <option>三级</option>
            </select>
          </label>
          <label class="field">
            <span>所属区域</span>
            <select name="region">
              <option value="">全部区域</option>
              <option>朝阳区</option>
              <option>海淀区</option>
              <option>丰台区</option>
              <option>通州区</option>
              <option>昌平区</option>
            </select>
          </label>
          <label class="field">
            <span>起始日期</span>
            <input type="date" name="startDate">
          </label>
          <label class="field">
            <span>截止日期</span>
            <input type="date" name="endDate">
          </label>
          <label class="field">
            <span>数据状态</span>
            <select name="status">
              <option value="">全部状态</option>
              <option>正常</option>
              <option>预警</option>
              <option>待核验</option>
            </select>
          </label>
        </div>

        <div class="filter-actions">
          <button class="btn-secondary" type="button" id="resetBtn">重置条件</button>
          <button class="btn-primary" type="submit" id="searchBtn">执行查询</button>
        </div>
      </form>

      <div class="active-filters" id="activeFilters"></div>
    </section>

    <section class="summary-strip fade-up" id="metricStrip"></section>

    <div class="dashboard-grid">
      <section class="panel fade-up">
        <div class="panel-head">
          <div>
            <span class="panel-tag">Analysis View</span>
            <h2 id="moduleTitle">建筑业分析</h2>
            <p id="moduleDesc"></p>
          </div>
          <div class="status-time">
            数据快照<br>
            <strong id="moduleSnapshot"></strong>
          </div>
        </div>

        <div class="dimension-tabs" id="dimensionTabs"></div>

        <div class="chart-layout">
          <article class="chart-card">
            <h3 id="trendTitle"></h3>
            <p id="trendDesc"></p>
            <div class="line-chart" id="lineChart"></div>
            <div class="chart-note-row">
              <span id="trendLeftNote"></span>
              <span id="trendRightNote"></span>
            </div>
          </article>

          <article class="sub-card">
            <h3 id="compositionTitle"></h3>
            <p id="compositionDesc"></p>
            <div class="bar-list" id="barChart"></div>
          </article>
        </div>

        <div class="dimension-detail" id="dimensionDetail"></div>

        <article class="sub-card">
          <div class="panel-head">
            <div>
              <span class="panel-tag">Sample Table</span>
              <h3 id="tableTitle"></h3>
              <p id="tableDesc"></p>
            </div>
          </div>
          <div class="data-table-wrap">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"></tbody>
            </table>
          </div>
        </article>
      </section>

      <aside class="panel side-stage fade-up">
        <article class="sub-card">
          <div class="panel-head">
            <div>
              <span class="panel-tag">Insight</span>
              <h3>分析结论</h3>
              <p>每个统计维度对应的核心观察与管理建议。</p>
            </div>
          </div>
          <div class="insight-list" id="insightList"></div>
        </article>

        <article class="sub-card">
          <div class="panel-head">
            <div>
              <span class="panel-tag">Ranking</span>
              <h3 id="rankingTitle"></h3>
              <p>支持切换栏目后同步刷新热度排名与重点区域。</p>
            </div>
          </div>
          <div class="ranking-list" id="rankingList"></div>
        </article>

        <article class="sub-card">
          <div class="panel-head">
            <div>
              <span class="panel-tag">Alert</span>
              <h3>重点预警</h3>
              <p>聚合到期、异常、备案偏低与区域集中度风险。</p>
            </div>
          </div>
          <div class="alert-list" id="alertList"></div>
        </article>
      </aside>
    </div>

    <div class="footer-note">页面为静态演示版，可继续接入真实接口、ECharts 和导出能力。</div>
  </div>

  <script>
    const dashboardData = [
      {
        id: "construction",
        name: "建筑业分析",
        short: "企业画像",
        description: "围绕建筑企业名录、审批办理、资质等级与区域分布，形成建筑业企业全景分析。",
        snapshot: "2026-05-21 09:00",
        metrics: [
          { label: "在册建筑企业", value: "12,864", delta: "+126 较上月" },
          { label: "本月审批办结", value: "1,248", delta: "办结率 96.2%" },
          { label: "重点预警企业", value: "186", delta: "-18 较上周" },
          { label: "高等级资质企业", value: "2,406", delta: "占比 18.7%" }
        ],
        dimensions: [
          {
            id: "enterprise-directory",

    const state = {
      activeModuleId: dashboardData[0].id,
      activeDimensionId: dashboardData[0].dimensions[0].id,
      filters: {}
    };

    const elements = {
      moduleTabs: document.getElementById("moduleTabs"),
      metricStrip: document.getElementById("metricStrip"),
      moduleTitle: document.getElementById("moduleTitle"),
      moduleDesc: document.getElementById("moduleDesc"),
      moduleSnapshot: document.getElementById("moduleSnapshot"),
      dimensionTabs: document.getElementById("dimensionTabs"),
      trendTitle: document.getElementById("trendTitle"),
      trendDesc: document.getElementById("trendDesc"),
      trendLeftNote: document.getElementById("trendLeftNote"),
      trendRightNote: document.getElementById("trendRightNote"),
      lineChart: document.getElementById("lineChart"),
      compositionTitle: document.getElementById("compositionTitle"),
      compositionDesc: document.getElementById("compositionDesc"),
      barChart: document.getElementById("barChart"),
      dimensionDetail: document.getElementById("dimensionDetail"),
      tableTitle: document.getElementById("tableTitle"),
      tableDesc: document.getElementById("tableDesc"),
      tableHead: document.getElementById("tableHead"),
      tableBody: document.getElementById("tableBody"),
      insightList: document.getElementById("insightList"),
      rankingTitle: document.getElementById("rankingTitle"),
      rankingList: document.getElementById("rankingList"),
      alertList: document.getElementById("alertList"),
      activeFilters: document.getElementById("activeFilters"),
      queryForm: document.getElementById("queryForm"),
      resetBtn: document.getElementById("resetBtn"),
      statusModuleName: null
    };

    function getActiveModule() {
      return dashboardData.find((item) => item.id === state.activeModuleId) || dashboardData[0];
    }

    function getActiveDimension(module = getActiveModule()) {
      return module.dimensions.find((item) => item.id === state.activeDimensionId) || module.dimensions[0];
    }

    function renderModuleTabs() {
      elements.moduleTabs.innerHTML = dashboardData.map((module) => `
        <button class="module-tab ${module.id === state.activeModuleId ? "active" : ""}" type="button" data-module-id="${module.id}">
          <strong>${module.name}</strong>
          <span>${module.short}</span>
        </button>
      `).join("");
    }

    function renderMetrics(module) {
      elements.metricStrip.innerHTML = module.metrics.map((item) => `
        <article class="metric-card">
          <span>${item.label}</span>
          <div class="metric-main">
            <strong>${item.value}</strong>
            <em>${item.delta}</em>
          </div>
        </article>
      `).join("");
    }

    function renderDimensionTabs(module) {
      elements.dimensionTabs.innerHTML = module.dimensions.map((item) => `
        <button class="dimension-tab ${item.id === state.activeDimensionId ? "active" : ""}" type="button" data-dimension-id="${item.id}">
          ${item.name}
        </button>
      `).join("");
    }

    function renderLineChart(dimension) {
      const width = 720;
      const height = 230;
      const paddingX = 44;
      const paddingTop = 24;
      const paddingBottom = 42;
      const values = dimension.trend;
      const labels = dimension.trendLabels;
      const max = Math.max(...values);
      const min = Math.min(...values);
      const range = max - min || 1;
      const stepX = (width - paddingX * 2) / Math.max(values.length - 1, 1);

      const points = values.map((value, index) => {
        const x = paddingX + stepX * index;
        const y = paddingTop + ((max - value) / range) * (height - paddingTop - paddingBottom);
        return { x, y, value, label: labels[index] };
      });

      const polyline = points.map((point) => `${point.x},${point.y}`).join(" ");
      const area = `${paddingX},${height - paddingBottom} ${polyline} ${points[points.length - 1].x},${height - paddingBottom}`;
      const gridLines = 4;

      elements.lineChart.innerHTML = `
        <svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${dimension.trendTitle}">
          <defs>
            <linearGradient id="lineFill" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="rgba(71,178,255,0.36)"></stop>
              <stop offset="100%" stop-color="rgba(71,178,255,0.02)"></stop>
            </linearGradient>
            <linearGradient id="lineStroke" x1="0" y1="0" x2="1" y2="0">
              <stop offset="0%" stop-color="#47b2ff"></stop>
              <stop offset="100%" stop-color="#3ed7c8"></stop>
            </linearGradient>
          </defs>
          ${Array.from({ length: gridLines + 1 }).map((_, index) => {
            const y = paddingTop + ((height - paddingTop - paddingBottom) / gridLines) * index;
            return `<line x1="${paddingX}" y1="${y}" x2="${width - paddingX}" y2="${y}" stroke="rgba(127,214,255,0.1)" stroke-dasharray="4 6"></line>`;
          }).join("")}
          <polygon points="${area}" fill="url(#lineFill)"></polygon>
          <polyline points="${polyline}" fill="none" stroke="url(#lineStroke)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"></polyline>
          ${points.map((point) => `
            <g>
              <circle cx="${point.x}" cy="${point.y}" r="5.5" fill="#06111f" stroke="#7fd6ff" stroke-width="3"></circle>
              <text x="${point.x}" y="${point.y - 14}" fill="#dff2ff" font-size="12" text-anchor="middle">${point.value}</text>
              <text x="${point.x}" y="${height - 16}" fill="#8da9c4" font-size="12" text-anchor="middle">${point.label}</text>
            </g>
          `).join("")}
        </svg>
      `;
    }

    function renderBars(dimension) {
      const max = Math.max(...dimension.composition.map((item) => item.value), 1);
      elements.barChart.innerHTML = dimension.composition.map((item) => `
        <div class="bar-item">
          <div class="bar-top">
            <span>${item.label}</span>
            <strong>${item.value}</strong>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${(item.value / max) * 100}%"></div>
          </div>
        </div>
      `).join("");
    }

    function renderDimensionDetail(dimension) {
      elements.dimensionDetail.innerHTML = dimension.focus.map((item) => `
        <article class="detail-card">
          <span>${item.label}</span>
          <strong>${item.value}</strong>
          <p>${item.note}</p>
        </article>
      `).join("");
    }

    function renderTable(dimension) {
      elements.tableTitle.textContent = dimension.tableTitle;
      elements.tableDesc.textContent = dimension.tableDesc;
      elements.tableHead.innerHTML = `
        <tr>
          ${dimension.columns.map((item) => `<th>${item}</th>`).join("")}
        </tr>
      `;
      elements.tableBody.innerHTML = dimension.rows.map((row) => `
        <tr>${row.map((cell) => `<td>${cell}</td>`).join("")}</tr>
      `).join("");
    }

    function renderInsights(dimension) {
      elements.insightList.innerHTML = dimension.insights.map((item) => `
        <article class="insight-item">
          <strong>${item.title}</strong>
          <p>${item.body}</p>
        </article>
      `).join("");
    }

    function renderRanking(dimension) {
      elements.rankingTitle.textContent = dimension.rankingTitle;
      elements.rankingList.innerHTML = dimension.ranking.map((item, index) => `
        <article class="ranking-item">
          <div class="ranking-index">${index + 1}</div>
          <div class="ranking-copy">
            <strong>${item.name}</strong>
            <p>${item.note}</p>
          </div>
          <div class="ranking-value">${item.value}</div>
        </article>
      `).join("");
    }

    function renderAlerts(dimension) {
      elements.alertList.innerHTML = dimension.alerts.map((item) => `
        <article class="alert-item">
          <strong>${item.title}</strong>
          <p>${item.body}</p>
        </article>
      `).join("");
    }

    function renderFilters() {
      const entries = Object.entries(state.filters).filter(([, value]) => value);
      if (!entries.length) {
        elements.activeFilters.innerHTML = '<span class="filter-chip">当前未设置额外筛选条件，展示为全量统计视图。</span>';
        return;
      }

      const labelMap = {
        enterpriseName: "企业名称",
        orgCode: "组织机构代码",
        qualification: "企业资质",
        grade: "证书等级",
        region: "所属区域",
        startDate: "起始日期",
        endDate: "截止日期",
        status: "数据状态"
      };

      elements.activeFilters.innerHTML = entries.map(([key, value]) => `
        <span class="filter-chip">${labelMap[key] || key}：${value}</span>
      `).join("");
    }

    function render() {
      const module = getActiveModule();
      const dimension = getActiveDimension(module);

      elements.moduleTitle.textContent = module.name;
      elements.moduleDesc.textContent = `${module.description} 当前维度：${dimension.name}。${dimension.summary}`;
      elements.moduleSnapshot.textContent = module.snapshot;

      elements.trendTitle.textContent = dimension.trendTitle;
      elements.trendDesc.textContent = dimension.trendDesc;
      elements.trendLeftNote.textContent = dimension.trendLeftNote;
      elements.trendRightNote.textContent = dimension.trendRightNote;
      elements.compositionTitle.textContent = dimension.compositionTitle;
      elements.compositionDesc.textContent = dimension.compositionDesc;

      renderModuleTabs();
      renderMetrics(module);
      renderDimensionTabs(module);
      renderLineChart(dimension);
      renderBars(dimension);
      renderDimensionDetail(dimension);
      renderTable(dimension);
      renderInsights(dimension);
      renderRanking(dimension);
      renderAlerts(dimension);
      renderFilters();
    }

    elements.moduleTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-module-id]");
      if (!button) return;
      const nextModule = dashboardData.find((item) => item.id === button.dataset.moduleId);
      if (!nextModule) return;
      state.activeModuleId = nextModule.id;
      state.activeDimensionId = nextModule.dimensions[0].id;
      render();
    });

    elements.dimensionTabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-dimension-id]");
      if (!button) return;
      state.activeDimensionId = button.dataset.dimensionId;
      render();
    });

    elements.queryForm.addEventListener("submit", (event) => {
      event.preventDefault();
      const formData = new FormData(elements.queryForm);
      state.filters = Object.fromEntries(formData.entries());
      renderFilters();
    });

    elements.resetBtn.addEventListener("click", () => {
      elements.queryForm.reset();
      state.filters = {};
      renderFilters();
    });

    render();
  </script>
